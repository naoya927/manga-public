    function selectCalendarDate(isoDate, options = {}) {
        const { fromHistory = false } = options;
        if (calendarState.suppressNextSelection) {
            calendarState.suppressNextSelection = false;
            return;
        }
        calendarState.selectedDate = isoDate;
        calendarState.isEntryPopoverOpen = true;
        calendarState.editingEntryId = '';
        lockCalendarBodyScroll();
        renderCalendarView();
        focusCalendarTitleInput();
        if (!fromHistory) pushCurrentHistoryState();
    }

    function changeCalendarMonth(offset, options = {}) {
        const { fromHistory = false } = options;
        calendarState.currentMonth = new Date(calendarState.currentMonth.getFullYear(), calendarState.currentMonth.getMonth() + offset, 1);
        calendarState.selectedDate = '';
        calendarState.isEntryPopoverOpen = false;
        calendarState.editingEntryId = '';
        unlockCalendarBodyScroll();
        renderCalendarView();
        if (!fromHistory) pushCurrentHistoryState();
    }

    function jumpCalendarToToday(options = {}) {
        const { fromHistory = false } = options;
        const todayIso = getTodayIso();
        const [year, month] = todayIso.split('-');
        calendarState.currentMonth = new Date(Number(year), Number(month) - 1, 1);
        calendarState.selectedDate = todayIso;
        calendarState.isEntryPopoverOpen = false;
        calendarState.editingEntryId = '';
        unlockCalendarBodyScroll();
        renderCalendarView();
        if (!fromHistory) pushCurrentHistoryState();
    }

    // ===== 記録読み込み（グリッド） =====
    async function loadRecords() {
        const container = document.getElementById('records-container');
        try {
            await fetchAllRecords();
            renderRecordsGrid(getFilteredRecordEntries());
        } catch (e) {
            console.error(e);
            container.innerHTML = '<div class="panel" style="grid-column:1/-1;color:red;text-align:center;font-weight:bold;font-size:1.2rem;padding:32px;">通信エラー</div>';
        }
    }

    function getActiveTabId() {
        return document.querySelector('.tab-content.active')?.id?.replace('tab-', '') || 'records';
    }

    async function refreshVisibleRecordViews() {
        const activeTabId = getActiveTabId();
        if (activeTabId === 'favorites') {
            await loadFavorites();
            return;
        }
        await loadRecords();
    }

    async function deleteRecord(title, date) {
        if (!title || !date) return;
        const shouldDelete = window.confirm(`「${title}」の記録を削除しますか？`);
        if (!shouldDelete) return;

        try {
            const resp = await fetch('/api/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, date })
            });
            const result = await resp.json().catch(() => ({}));
            if (!resp.ok) {
                alert(result.error || '削除に失敗しました。');
                return;
            }

            closeModal();
            await refreshVisibleRecordViews();
        } catch (e) {
            console.error(e);
            alert('通信エラーで削除できませんでした。');
        }
    }

    function deleteRecordByIndex(idx) {
        const record = allRecords[idx];
        if (!record) return;
        deleteRecord(record.title, record.date);
    }

    function openImageLightbox(src, alt = '', options = {}) {
        const { fromHistory = false } = options;
        const overlay = document.getElementById('image-lightbox');
        const image = document.getElementById('image-lightbox-img');
        if (!overlay || !image || !src) return;
        currentLightboxState = { src, alt };
        image.src = src;
        image.alt = alt || '拡大画像';
        overlay.classList.add('active');
        if (!fromHistory) pushCurrentHistoryState();
    }

    function closeImageLightbox(fromHistory = false) {
        if (!fromHistory && navigateBackWithinApp()) return;
        closeImageLightboxDirect();
    }

        const root = document.getElementById('calendar-root');

                try {
                    await fetchAllRecords();
                } catch (e) {
                    console.warn('calendar title suggestions unavailable', e);

    // ギャラリー部分のHTML生成とイベント付着（部分更新用）
    function updateGalleryUI(idx) {
        const record = allRecords[idx];
        if (!record) return;
        const leftPanel = document.querySelector('.modal-left');
        if (!leftPanel) return;

        const gallery = record.gallery || [];
        let galleryItemsHtml = '';
        gallery.forEach((imgPath) => {
            galleryItemsHtml += `
                <div class="gallery-item" draggable="true" ondragstart="event.dataTransfer.setData('application/x-manga-gallery-image', '${imgPath}')">
                    <img src="${imgPath}" alt="ギャラリー画像" class="previewable-image" data-preview-src="${escapeAttr(imgPath)}" data-preview-alt="${escapeAttr(record.title)} のギャラリー画像">
                    <button class="gallery-remove" onclick="event.stopPropagation(); removeGalleryImage(${idx}, '${escapeAttr(imgPath)}')" title="この画像を削除">✕</button>
                </div>`;
        });

        const canAdd = gallery.length < 3;
        const dropzoneHtml = canAdd ? `
            <div class="gallery-dropzone" id="gallery-dropzone">
                📷 画像をドラッグ＆ドロップ<br><small>または検索から追加（残り${3 - gallery.length}枚）</small>
            </div>` : '';

        leftPanel.innerHTML = `
            <div style="font-weight:900; font-size:1.1rem; color:var(--text-muted); margin-bottom:4px;">📸 ギャラリー <span class="gallery-count">(${gallery.length}/3)</span></div>
            <div class="gallery-grid">
                ${galleryItemsHtml || '<div style="color:var(--text-muted); text-align:center; padding:24px; font-size:0.95rem;">まだ画像がありません</div>'}
            </div>
            ${dropzoneHtml}
        `;

        // ドロップゾーンのイベント設定
        const dz = document.getElementById('gallery-dropzone');
        if (dz) {
            dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('dragover'); });
            dz.addEventListener('dragleave', (e) => { e.preventDefault(); dz.classList.remove('dragover'); });
            dz.addEventListener('drop', (e) => {
                e.preventDefault(); e.stopPropagation();
                dz.classList.remove('dragover');

                const ddgImageUrl = e.dataTransfer.getData('application/x-ddg-image');
                if (ddgImageUrl) {
                    applySearchImage(idx, ddgImageUrl);
                    return;
                }

                const mainImagePath = e.dataTransfer.getData('application/x-manga-main-image');
                if (mainImagePath) {
                    // 表紙画像をギャラリーに追加
                    // プロキシを介さずそのままでも良いが、Base64に変換して再保存する
                    const img = new Image();
                    img.crossOrigin = 'Anonymous';
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; canvas.height = img.height;
                        canvas.getContext('2d').drawImage(img, 0, 0);
                        addGalleryImage(idx, canvas.toDataURL('image/png'));
                    };
                    img.src = mainImagePath;
                    return;
                }

                if (e.dataTransfer.files.length > 0) {
                    const file = e.dataTransfer.files[0];
                    if (!file.type.startsWith('image/')) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => addGalleryImage(idx, ev.target.result);
                    reader.readAsDataURL(file);
                }
            });
        }

        leftPanel.querySelectorAll('.gallery-item img').forEach((imgEl) => {
            imgEl.addEventListener('click', (event) => {
                event.stopPropagation();
                openImageLightbox(imgEl.dataset.previewSrc || imgEl.getAttribute('src') || '', imgEl.dataset.previewAlt || imgEl.alt || '');
            });
        });
    }

    // ===== モーダル表示（2パネル: 左=ギャラリー, 右=感想） =====
    function openModal(idx, options = {}) {
        const { fromHistory = false } = options;
        const record = allRecords[idx];
        if (!record) return;
        const modal = document.getElementById('modal-overlay');
        const body = document.getElementById('modal-body');
        currentModalState = { type: 'view', title: record.title, date: record.date };

        // 右パネル（既存コンテンツ）
        const imgHtml = record.image
            ? `<img src="${record.image}" class="acc-content-image previewable-image" id="main-image-dropzone" alt="漫画画像" title="ドラッグ＆ドロップで表紙を変更 / 表紙をギャラリーへ / タップで拡大" 
                draggable="true" ondragstart="event.dataTransfer.setData('application/x-manga-main-image', '${record.image}')"
                style="cursor:grab; transition:all 0.2s;">`
            : `<div class="gallery-dropzone" id="main-image-dropzone" style="margin-bottom: 24px; min-height:150px;">ここに表紙画像をドラッグ＆ドロップ</div>`;
        let quoteHtml = '';
        if (record.quote) {
            const formattedQuote = record.quote.split('\n')
                .map(line => line.trim()).filter(line => line.length > 0)
                .map(line => { let t = line; if (t.startsWith('「')) t = t.substring(1); if (t.endsWith('」')) t = t.substring(0, t.length - 1); return `「${escapeHTML(t)}」`; })
                .join('<br>');
            quoteHtml = `<div class="acc-quote">${formattedQuote}</div>`;
        }
                let summaryHtml = '';
                if (record.summary) {
                    const items = record.summary
                        .split('\n')
                        .map(l => l.trim())
                        .filter(Boolean)
                        .map(l => l.replace(/^[-・*]\s*/,''))
                        .filter(Boolean);
                    if (items.length > 0) {
                        summaryHtml = `
                            <div style="margin-top:16px;">
                                <div style="font-weight:900; color:var(--primary-hover); margin-bottom:8px;">箇条書きまとめ</div>
                                <ul style="padding-left:20px; margin:0;">
                                    ${items.map(i => `<li>${escapeHTML(i)}</li>`).join('')}
                                </ul>
                            </div>`;
                    }
                }

                const tagHtml = record.tag ? `<div class="acc-tag">#${escapeHTML(record.tag)}</div>` : '';

        body.innerHTML = `
            <div class="modal-dual">
                <div class="modal-left"></div>
                <div class="modal-right">
                    <div class="modal-title">${escapeHTML(record.title)}</div>
                    <div class="modal-date">${escapeHTML(record.date)}</div>
                    ${imgHtml}
                    ${quoteHtml}
                    <div class="acc-thoughts">${escapeHTML(record.thoughts).replace(/\n/g, '<br>')}</div>
                    ${tagHtml}
                    ${summaryHtml}
                    <button class="btn-ai-generate" type="button" onclick="generateSummaryForModal(${idx}, this)">
                        🧠 AIでまとめる
                    </button>
                    <div class="modal-action-row" style="margin-top:20px; display:flex; gap:12px; flex-wrap:wrap;">
                        <button class="edit-btn" onclick="openModalEditFromDetail(${idx})">✏️ 編集する</button>
                        <button class="edit-btn" style="background:rgba(16,185,129,0.1); color:var(--primary-color); border-color:rgba(16,185,129,0.2);" onclick="toggleSearchPanel(${idx})">🔍 画像を検索</button>
                        <button class="delete-btn" onclick="deleteRecordByIndex(${idx})">🗑️ 削除する</button>
                    </div>
                    <div id="search-panel-area"></div>
                </div>
            </div>
        `;
        body.dataset.idx = idx;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden'; // 背景のスクロールをロック

        // ギャラリー部分のレンダリング
        updateGalleryUI(idx);

        // 右パネルのメイン画像ドロップゾーン（ローカル / ギャラリー / 検索結果）
        const mz = document.getElementById('main-image-dropzone');
        if (mz) {
            if (mz.tagName === 'IMG') {
                mz.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openImageLightbox(record.image, `${record.title} の表紙画像`);
                });
            }
            mz.addEventListener('dragover', (e) => { e.preventDefault(); mz.style.opacity = '0.5'; mz.style.outline = '4px dashed var(--primary-color)'; });
            mz.addEventListener('dragleave', (e) => { e.preventDefault(); mz.style.opacity = '1'; mz.style.outline = 'none'; });
            mz.addEventListener('drop', async (e) => {
                e.preventDefault(); e.stopPropagation();
                mz.style.opacity = '1'; mz.style.outline = 'none';
                
                // 1. 検索結果からのドラッグ
                const ddgImageUrl = e.dataTransfer.getData('application/x-ddg-image');
                if (ddgImageUrl) {
                    applySearchImage(idx, ddgImageUrl, true); // true = 表紙に適用
                    return;
                }

                // 2. ギャラリーからのドラッグ
                const galleryImagePath = e.dataTransfer.getData('application/x-manga-gallery-image');
                if (galleryImagePath) {
                    await setMainImage(idx, { keep_image: galleryImagePath });
                    return;
                }

                // 3. ローカルファイル
                if (e.dataTransfer.files.length > 0) {
                    const file = e.dataTransfer.files[0];
                    if (!file.type.startsWith('image/')) return;
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        await setMainImage(idx, { image: ev.target.result });
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
        if (!fromHistory) pushCurrentHistoryState();
    }

    // 表紙画像の設定（共通ヘルパー）
    async function setMainImage(idx, imgData) {
        const record = allRecords[idx];
        if (!record) return;

        // Ctrl+Zのために履歴保存
        imageHistory.push({ idx, prevImage: record.image || '', title: record.title, date: record.date });

        try {
            const saveResp = await fetch('/api/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    orig_title: record.title, orig_date: record.date,
                    title: record.title, quote: record.quote, thoughts: record.thoughts, summary: record.summary, tag: record.tag,
                    ...imgData
                })
            });
            if (saveResp.ok) {
                await loadRecords(); 
                openModal(idx);
            } else {
                imageHistory.pop(); alert('更新失敗');
            }
        } catch(err) { imageHistory.pop(); alert('通信エラー'); }
    }

    // ===== ギャラリー操作 =====
    async function addGalleryImage(idx, imageB64) {
        const record = allRecords[idx];
        if (!record) return;
        try {
            const resp = await fetch('/api/gallery-add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: record.title, date: record.date, image: imageB64 })
            });
            if (resp.ok) {
                await loadRecords();
                updateGalleryUI(idx); // 部分更新
            } else {
                const err = await resp.json();
                alert(err.error || 'ギャラリーの追加に失敗しました');
            }
        } catch (e) { console.error(e); alert('通信エラー'); }
    }

    async function removeGalleryImage(idx, imgPath) {
        const record = allRecords[idx];
        if (!record) return;
        try {
            const resp = await fetch('/api/gallery-remove', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: record.title, date: record.date, image_path: imgPath })
            });
            if (resp.ok) {
                await loadRecords();
                updateGalleryUI(idx); // 部分更新
            }
        } catch (e) { console.error(e); }
    }

    function openModalEdit(idx, options = {}) {
        const { fromHistory = false } = options;
        const record = allRecords[idx];
        if (!record) return;
        const modal = document.getElementById('modal-overlay');
        const body = document.getElementById('modal-body');
        currentModalState = { type: 'edit', title: record.title, date: record.date };

        let quoteVal = escapeHTML(record.quote || '');
        let editImageState = record.image || '';

        body.innerHTML = `
            <div class="modal-title">編集: ${escapeHTML(record.title)}</div>
            <div class="edit-form" style="overflow-y: auto; max-height: calc(90vh - 120px); padding-right: 8px;">
                <div class="edit-group">
                    <label>漫画タイトル</label>
                    <input type="text" class="edit-title" value="${escapeAttr(record.title)}">
                </div>
                <div class="edit-group">
                    <label>名言・お気に入りセリフ</label>
                    <textarea class="edit-quote">${quoteVal}</textarea>
                </div>
                <div class="edit-group">
                    <label>感想</label>
                    <textarea class="edit-thoughts">${escapeHTML(record.thoughts)}</textarea>
                </div>
                <div class="edit-group">
                    <label>感情タグ</label>
                    <input type="text" class="edit-tag" value="${escapeAttr(record.tag)}">
                </div>
                <div class="edit-group">
                    <label>箇条書きまとめ</label>
                    <textarea class="edit-summary">${escapeHTML(record.summary || '')}</textarea>
                </div>
                <button type="button" class="btn-ai-generate" onclick="generateSummaryInEdit(${idx}, this)">
                    🧠 AIでまとめる
                </button>
                <div class="edit-group">
                    <label>画像</label>
                    <div class="edit-image-drop" id="modal-edit-img-drop"
                         style="${editImageState ? 'background-image:url(' + editImageState + ')' : ''}">
                        ${editImageState ? '' : '<span>画像をドラッグ＆ドロップ</span>'}
                    </div>
                    <div class="edit-image-actions">
                        <button type="button" class="edit-image-clear" onclick="clearModalEditImage()">画像を削除</button>
                    </div>
                </div>
                <div class="edit-btn-row">
                    <button class="btn-save-edit" onclick="saveModalEdit(${idx})">保存する</button>
                    <button class="btn-cancel-edit" onclick="closeModal()">キャンセル</button>
                </div>
            </div>
        `;

        // 画像ドロップ
        const dropArea = document.getElementById('modal-edit-img-drop');
        let newImageB64 = '';
        let keepImage = editImageState;
        let removeImage = false;

        dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('dragover'); });
        dropArea.addEventListener('dragleave', e => { e.preventDefault(); dropArea.classList.remove('dragover'); });
        dropArea.addEventListener('drop', e => {
            e.preventDefault(); e.stopPropagation(); dropArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                const file = e.dataTransfer.files[0];
                if (!file.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = ev => {
                    newImageB64 = ev.target.result;
                    dropArea.style.backgroundImage = `url(${newImageB64})`;
                    dropArea.innerHTML = '';
                    removeImage = false;
                };
                reader.readAsDataURL(file);
            }
        });

        window._modalEditState = { newImageB64: () => newImageB64, keepImage, removeImage: () => removeImage };
        window._clearModalEditImage = () => {
            newImageB64 = '';
            keepImage = '';
            removeImage = true;
            dropArea.style.backgroundImage = 'none';
            dropArea.innerHTML = '<span>画像をドラッグ＆ドロップ</span>';
        };

        modal.classList.add('active');
        document.body.style.overflow = 'hidden'; // 背景のスクロールをロック
        if (!fromHistory) pushCurrentHistoryState();
    }

    function clearModalEditImage() { window._clearModalEditImage && window._clearModalEditImage(); }

    async function saveModalEdit(idx) {
        const record = allRecords[idx];
        const body = document.getElementById('modal-body');
        const data = {
            orig_title: record.title,
            orig_date: record.date,
            title: body.querySelector('.edit-title').value,
            quote: body.querySelector('.edit-quote').value,
            thoughts: body.querySelector('.edit-thoughts').value,
            summary: body.querySelector('.edit-summary').value,
            tag: body.querySelector('.edit-tag').value,
        };

        const state = window._modalEditState;
        if (state) {
            if (state.removeImage()) {
                data.remove_image = true;
            } else if (state.newImageB64()) {
                data.image = state.newImageB64();
            } else if (state.keepImage) {
                data.keep_image = state.keepImage;
            }
        }

        try {
            const resp = await fetch('/api/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (resp.ok) {
                closeModal();
                loadRecords();
            } else {
                alert('更新に失敗しました');
            }
        } catch (e) { alert('通信エラーが発生しました'); }
    }

    // ===== 画像検索機能 =====
    function toggleSearchPanel(idx) {
        const area = document.getElementById('search-panel-area');
        if (area.querySelector('.search-panel')) {
            area.innerHTML = '';
            return;
        }
        const record = allRecords[idx];
        const defaultQuery = record ? record.title + ' 漫画' : '';
        area.innerHTML = `
            <div class="search-panel">
                <div class="search-bar">
                    <input type="text" id="search-query" value="${escapeAttr(defaultQuery)}" placeholder="検索キーワードを入力..."
                           onkeydown="if(event.key==='Enter'){event.preventDefault(); searchImages(${idx});}">
                    <button onclick="searchImages(${idx})">🔍 検索</button>
                </div>
                <div id="search-results-container"></div>
            </div>
        `;
        document.getElementById('search-query').focus();
        searchImages(idx);
    }

    async function searchImages(idx) {
        const queryInput = document.getElementById('search-query');
        if (!queryInput) return;
        const query = queryInput.value.trim();
        if (!query) return;

        const container = document.getElementById('search-results-container');
        container.innerHTML = '<div class="search-loading">🔍 画像を検索中...</div>';

        try {
            const resp = await fetch('/api/image-search?q=' + encodeURIComponent(query));
            const results = await resp.json();

            if (results.length === 0) {
                container.innerHTML = '<div class="search-loading">画像が見つかりませんでした。キーワードを変えて再検索してみてください。</div>';
                return;
            }

            container.innerHTML = '<div class="search-results"></div>';
            const grid = container.querySelector('.search-results');

            results.forEach((img, i) => {
                const thumb = document.createElement('div');
                thumb.className = 'search-thumb';
                thumb.title = img.title || '';
                thumb.onclick = () => applySearchImage(idx, img.image);
                thumb.innerHTML = `<img src="/api/image-proxy?url=${encodeURIComponent(img.thumbnail)}" alt="${escapeAttr(img.title || '')}" loading="lazy" onerror="this.parentElement.style.display='none'" draggable="true" ondragstart="event.dataTransfer.setData('application/x-ddg-image', '${img.image}')">`;
                grid.appendChild(thumb);
            });
        } catch (e) {
            console.error(e);
            container.innerHTML = '<div class="search-loading" style="color:var(--danger-color);">検索中にエラーが発生しました。</div>';
        }
    }

    async function applySearchImage(idx, imageUrl, toMainCover = false) {
        const record = allRecords[idx];
        if (!record || !imageUrl) return;

        // ギャラリーへの追加時のみ枚数チェック
        if (!toMainCover && (record.gallery || []).length >= 3) {
            alert('ギャラリーは最大3枚です。先に画像を削除してください。');
            return;
        }

        // 保存中のフィードバックを出せる場所を探す
        const countLabel = document.querySelector('.gallery-count');
        const originalText = countLabel ? countLabel.innerText : '';
        if (countLabel) countLabel.innerText = toMainCover ? '(表紙保存中...)' : '(ギャラリー保存中...)';

        try {
            const resp = await fetch('/api/image-proxy?url=' + encodeURIComponent(imageUrl));
            if (!resp.ok) throw new Error('画像の取得に失敗');

            const blob = await resp.blob();
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const b64 = ev.target.result;
                if (toMainCover) {
                    await setMainImage(idx, { image: b64 });
                } else {
                    await addGalleryImage(idx, b64);
                }
                if (countLabel) countLabel.innerText = originalText;
            };
            reader.readAsDataURL(blob);
        } catch (e) {
            console.error(e);
            if (countLabel) countLabel.innerText = originalText;
            alert('画像の取得に失敗しました。別の画像をお試しください。');
        }
    }

    // ===== 画像変更の Undo 履歴 =====
    const imageHistory = [];

    function closeModal(fromHistory = false) {
        if (!fromHistory && navigateBackWithinApp()) return;
        closeModalDirect();
    }

    async function applyHistoryState(state) {
        if (!state?.__appHistory) return;

        isApplyingHistoryState = true;
        try {
            closeModalDirect();
            if (calendarState.isEntryPopoverOpen) {
                closeCalendarEntryPopoverDirect();
            } else {
                unlockCalendarBodyScroll();
            }

            applyCurrentMonthStateValue(state.calendarMonth || getCurrentMonthStateValue());
            await switchTab(state.tab || 'input', { fromHistory: true });

            if ((state.tab || 'input') === 'calendar') {
                applyCurrentMonthStateValue(state.calendarMonth || getCurrentMonthStateValue());
                calendarState.selectedDate = state.calendarSelectedDate || '';
                calendarState.editingEntryId = '';
                calendarState.isEntryPopoverOpen = false;
                renderCalendarView();

                if (state.calendarPopoverOpen) {
                    calendarState.selectedDate = state.calendarSelectedDate || '';
                    calendarState.editingEntryId = state.calendarEditingEntryId || '';
                    calendarState.isEntryPopoverOpen = true;
                    lockCalendarBodyScroll();
                    renderCalendarView();
                }
            }

            if (state.modalType) {
                await ensureAllRecordsLoaded();
                const modalIdx = getRecordIndexByIdentity(state.modalTitle || '', state.modalDate || '');
                if (modalIdx >= 0) {
                    if (state.modalType === 'edit') {
                        openModalEdit(modalIdx, { fromHistory: true });
                    } else {
                        openModal(modalIdx, { fromHistory: true });
                    }
                }
            }

            if (state.lightboxSrc) {
                openImageLightbox(state.lightboxSrc, state.lightboxAlt || '拡大画像', { fromHistory: true });
            }
        } finally {
            isApplyingHistoryState = false;
        }
    }

    window.addEventListener('popstate', (event) => {
        if (!event.state?.__appHistory) return;
        appHistoryDepth = Math.max(0, appHistoryDepth - 1);
        void applyHistoryState(event.state);
    });

    // Escキーで表示中のオーバーレイを閉じる / Ctrl+Zで画像を元に戻す
    document.addEventListener('keydown', async (e) => {
        if (e.key === 'Escape') {
            const lightbox = document.getElementById('image-lightbox');
            if (lightbox?.classList.contains('active')) {
                closeImageLightbox();
                return;
            }

            if (calendarState.isEntryPopoverOpen) {
                closeCalendarEntryPopover();
                return;
            }

            const modal = document.getElementById('modal-overlay');
            if (modal?.classList.contains('active')) {
                closeModal();
                return;
            }
        }

        // Ctrl+Z (Mac: Cmd+Z) で画像変更を元に戻す
        if ((e.ctrlKey || e.metaKey) && e.key === 'z' && imageHistory.length > 0) {
            e.preventDefault();
            const last = imageHistory.pop();
            try {
                const data = {
                    orig_title: last.title,
                    orig_date: last.date,
                    title: last.title,
                    quote: allRecords[last.idx]?.quote || '',
                    thoughts: allRecords[last.idx]?.thoughts || '',
                    summary: allRecords[last.idx]?.summary || '',
                    tag: allRecords[last.idx]?.tag || '',
                };
                if (last.prevImage) {
                    data.keep_image = last.prevImage;
                } else {
                    data.remove_image = true;
                }
                const resp = await fetch('/api/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (resp.ok) {
                    await loadRecords();
                    openModal(last.idx);
                }
            } catch (err) { console.error('Undo failed:', err); }
        }
    });

    // ===== お気に入りトグル =====
    async function toggleFavorite(title, date, btnEl) {
        try {
            const resp = await fetch('/api/favorite', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, date })
            });
            if (resp.ok) {
                const result = await resp.json();
                btnEl.textContent = result.favorite ? '★' : '☆';
                btnEl.classList.toggle('favorited', result.favorite);
            }
        } catch (e) { console.error(e); }
    }

    // ===== お気に入り読み込み（グリッド） =====
    async function loadFavorites() {
        const container = document.getElementById('favorites-container');
        try {
            await fetchAllRecords();
            const favs = allRecords.filter((record) => record.favorite);
            container.innerHTML = '';

            if (favs.length === 0) {
                container.innerHTML = '<div class="panel empty-message" style="grid-column:1/-1;">まだお気に入りがありません。<br>過去の記録タブで⭐を押して登録しましょう！</div>';
                return;
            }

            favs.forEach((record) => {
                // allRecords 内の実際のインデックスを探す
                const realIdx = allRecords.findIndex(r => r.title === record.title && r.date === record.date);
                const card = document.createElement('div');
                card.className = 'manga-card';

                card.innerHTML = `
                    <div class="manga-card-title">${escapeHTML(record.title)}</div>
                    <div class="manga-card-actions">
                        <button class="star-btn favorited" onclick="event.stopPropagation(); toggleFavorite('${escapeAttr(record.title)}', '${escapeAttr(record.date)}', this)">★</button>
                    </div>
                `;
                attachPressableCardBehavior(card, () => openModal(realIdx >= 0 ? realIdx : 0));
                container.appendChild(card);
            });
        } catch (e) {
            console.error(e);
            container.innerHTML = '<div class="panel" style="grid-column:1/-1;color:red;text-align:center;font-weight:bold;font-size:1.2rem;padding:32px;">通信エラー</div>';
        }
    }

    // ===== 編集モードの開始 (互換用) =====
    function startEdit(btn, idx) {
        openModalEdit(idx);
    }

    // ===== AIで箇条書きまとめ生成 =====
    async function generateBulletSummary() {
        const titleInput = document.getElementById('title');
        const quoteInput = document.getElementById('quote');
        const thoughtsInput = document.getElementById('thoughts');
        const tagInput = document.getElementById('tag');
        const summaryInput = document.getElementById('bullet-summary');
        const btn = document.getElementById('generate-summary-btn');

        if (!thoughtsInput || !summaryInput) return;

        const title = titleInput ? titleInput.value.trim() : '';
        const quote = quoteInput ? quoteInput.value.trim() : '';
        const thoughts = thoughtsInput.value.trim();
        const tag = tagInput ? tagInput.value.trim() : '';

        if (!thoughts) {
            alert('感想を入力してください。');
            return;
        }

        if (btn) {
            btn.disabled = true;
            btn.textContent = 'まとめ中...';
        }
        summaryInput.value = '';

        try {
            const resp = await fetch('/api/bullet-summary', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, quote, thoughts, tag })
            });

            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.error || 'まとめに失敗しました');
            }

            const data = await resp.json();
            summaryInput.value = data.summary || '';
        } catch (e) {
            console.error(e);
            alert(e.message || '通信エラーが発生しました');
        } finally {
            if (btn) {
                btn.disabled = false;
                btn.textContent = 'AIで箇条書きにまとめる';
            }
        }
    }

    // ===== 詳細モーダルからAIでまとめる（保存まで行う）=====
    async function generateSummaryForModal(idx, btnEl) {
        const record = allRecords[idx];
        if (!record) return;

        if (!record.thoughts || !record.thoughts.trim()) {
            alert('感想（thoughts）を入力してください。');
            return;
        }

        const prevText = btnEl ? btnEl.textContent : '';
        if (btnEl) {
            btnEl.disabled = true;
            btnEl.textContent = 'まとめ中...';
        }

        try {
            const resp = await fetch('/api/bullet-summary', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: record.title,
                    quote: record.quote || '',
                    thoughts: record.thoughts || '',
                    tag: record.tag || ''
                })
            });

            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.error || 'まとめに失敗しました');
            }

            const data = await resp.json();
            const summary = (data.summary || '').trim();
            if (!summary) {
                alert('AIのまとめが生成できませんでした。');
                return;
            }

            const updateResp = await fetch('/api/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    orig_title: record.title,
                    orig_date: record.date,
                    title: record.title,
                    quote: record.quote || '',
                    thoughts: record.thoughts || '',
                    tag: record.tag || '',
                    summary
                })
            });

            if (!updateResp.ok) {
                const err = await updateResp.json().catch(() => ({}));
                throw new Error(err.error || '更新に失敗しました');
            }

            await loadRecords();
            const realIdx = allRecords.findIndex(r => r.title === record.title && r.date === record.date);
            openModal(realIdx >= 0 ? realIdx : idx);
        } catch (e) {
            console.error(e);
            alert(e.message || '通信エラーが発生しました');
        } finally {
            if (btnEl) {
                btnEl.disabled = false;
                btnEl.textContent = prevText || 'AIでまとめる';
            }
        }
    }

    // ===== 編集モーダルの入力値を使ってAIで生成（保存は手動）=====
    async function generateSummaryInEdit(idx, btnEl) {
        const record = allRecords[idx];
        if (!record) return;

        const body = document.getElementById('modal-body');
        if (!body) return;

        const titleVal = body.querySelector('.edit-title')?.value || record.title;
        const quoteVal = body.querySelector('.edit-quote')?.value || record.quote || '';
        const thoughtsVal = body.querySelector('.edit-thoughts')?.value || record.thoughts || '';
        const tagVal = body.querySelector('.edit-tag')?.value || record.tag || '';

        if (!thoughtsVal || !thoughtsVal.trim()) {
            alert('感想（thoughts）を入力してください。');
            return;
        }

        const summaryArea = body.querySelector('.edit-summary');
        if (!summaryArea) return;

        const prevText = btnEl ? btnEl.textContent : '';
        if (btnEl) {
            btnEl.disabled = true;
            btnEl.textContent = '生成中...';
        }

        try {
            const resp = await fetch('/api/bullet-summary', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: titleVal,
                    quote: quoteVal,
                    thoughts: thoughtsVal,
                    tag: tagVal
                })
            });

            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.error || '生成に失敗しました');
            }

            const data = await resp.json();
            const summary = (data.summary || '').trim();
            summaryArea.value = summary;
        } catch (e) {
            console.error(e);
            alert(e.message || '通信エラーが発生しました');
        } finally {
            if (btnEl) {
                btnEl.disabled = false;
                btnEl.textContent = prevText || 'AIでまとめる';
            }
        }
    }
    // ===== 新規保存 =====
    async function saveRecord() {
        const titleInput = document.getElementById('title');
        const quoteInput = document.getElementById('quote');
        const thoughtsInput = document.getElementById('thoughts');
        const tagInput = document.getElementById('tag');
        const summaryInput = document.getElementById('bullet-summary');
        const submitBtn = document.getElementById('submit-btn');

        const title = titleInput.value.trim();
        const thoughts = thoughtsInput.value.trim();
        if (!title || !thoughts) return;

        submitBtn.disabled = true;
        submitBtn.textContent = '保存中...';

        const data = {
            title, quote: quoteInput.value.trim(),
            thoughts, tag: tagInput.value.trim(),
            summary: summaryInput ? summaryInput.value.trim() : '',
            image: currentImageBase64
        };

        try {
            const response = await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (response.ok) {
                titleInput.value = '';
                quoteInput.value = '';
                thoughtsInput.value = '';
                tagInput.value = '';
                if (summaryInput) summaryInput.value = '';
                clearImage();
                switchTab('records');
            } else {
                const err = await response.json();
                alert("保存エラー: " + err.error);
            }
        } catch (e) {
            console.error(e);
            alert("保存に失敗しました。");
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = '保存する';
        }
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g,
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
    }

    function escapeAttr(str) {
        return str.replace(/[&<>"']/g,
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[tag] || tag)
        );
    }

    window.addEventListener('DOMContentLoaded', async () => {
        await loadRecords();
        const initialState = buildHistoryState();
        history.replaceState(initialState, '');
        history.pushState(initialState, '');
        appHistoryDepth = 1;
    });
</script>
