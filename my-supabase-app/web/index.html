    function normalizeSearchText(text) {
        return (text || '')
            .trim()
            .toLowerCase()
            .replace(/[\u30a1-\u30f6]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 0x60))
            .replace(/\s+/g, '');
    }

    function titleStartsWithQuery(title, query, titleReading = '') {
        const rawTitle = (title || '').trim().toLowerCase();
        const rawReading = (titleReading || '').trim().toLowerCase();
        const rawQuery = (query || '').trim().toLowerCase();
        const kanaTitle = normalizeSearchText(title);
        const kanaReading = normalizeSearchText(titleReading);
        const kanaQuery = normalizeSearchText(query);
        if (!rawQuery) return true;
        return (
            rawTitle.startsWith(rawQuery) ||
            rawReading.startsWith(rawQuery) ||
            (kanaQuery && (kanaTitle.startsWith(kanaQuery) || kanaReading.startsWith(kanaQuery)))
        );
    }

    function cacheCalendarEntriesLocally(entries) {
        localStorage.setItem(CALENDAR_STORAGE_KEY, JSON.stringify(entries));
    }

    function applyCalendarEntries(entries) {
        calendarEntries = Array.isArray(entries)
            ? entries.map((entry) => normalizeCalendarEntryForMerge(entry)).filter((entry) => entry.date && entry.title)
            : [];
        calendarLoadedAt = Date.now();
        cacheCalendarEntriesLocally(calendarEntries);
        return calendarEntries;
    }

    function isRecordsCacheFresh() {
        return allRecords.length > 0 && Date.now() - recordsLoadedAt < RECORDS_CACHE_TTL_MS;
    }

    function isCalendarCacheFresh() {
        return calendarEntries.length > 0 && Date.now() - calendarLoadedAt < CALENDAR_CACHE_TTL_MS;
    }

    function invalidateRecordsCache() {
        recordsLoadedAt = 0;
    }

    function invalidateCalendarCache() {
        calendarLoadedAt = 0;
    }

    function normalizeCalendarEntryForMerge(entry) {
        return {
            id: String(entry?.id || '').trim(),
            date: String(entry?.date || '').trim(),
            title: String(entry?.title || '').trim(),
            volumeStart: String(entry?.volumeStart || '').trim(),
            volumeEnd: String(entry?.volumeEnd || '').trim()
        };
    }

    function mergeCalendarEntries(serverEntries, legacyEntries) {
        const merged = [];
        const seen = new Set();

        [...serverEntries, ...legacyEntries].forEach((entry) => {
            const normalized = normalizeCalendarEntryForMerge(entry);
            if (!normalized.date || !normalized.title) return;
            const dedupeKey = normalized.id || [
                normalized.date,
                normalized.title,
                normalized.volumeStart,
                normalized.volumeEnd
            ].join('::');
            if (seen.has(dedupeKey)) return;
            seen.add(dedupeKey);
            if (!normalized.id) {
                normalized.id = `${Date.now()}-${merged.length}`;
            }
            merged.push(normalized);
        });

        return merged;
    }

    async function saveCalendarEntriesToServer(entries = calendarEntries) {
        const response = await fetch('/api/calendar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ entries })
        });
        if (!response.ok) throw new Error('カレンダーの保存に失敗しました。');

        const result = await response.json().catch(() => ({}));
        return applyCalendarEntries(result.entries);
    }

    async function loadCalendarEntries(options = {}) {
        const { force = false } = options;
        if (!force && isCalendarCacheFresh()) {
            return calendarEntries;
        }

        if (!force && calendarFetchPromise) {
            return calendarFetchPromise;
        }

        calendarFetchPromise = (async () => {
            const response = await fetch('/api/calendar', { cache: 'no-store' });
            if (!response.ok) throw new Error('カレンダーの読み込みに失敗しました。');

            const serverEntries = await response.json().catch(() => []);
            return applyCalendarEntries(serverEntries);
        })();

        try {
            return await calendarFetchPromise;
        } finally {
            calendarFetchPromise = null;
        }
    }

    function formatVolumeRange(entry) {
        const start = (entry.volumeStart || '').trim();
        const end = (entry.volumeEnd || '').trim();
        if (start && end && start === end) return `${start}巻`;
        if (start && end) return `${start}巻 〜 ${end}巻`;
        if (start) return `${start}巻`;
        if (end) return `${end}巻`;
        return '巻数未入力';
    }

    function countVolumesForEntry(entry) {
        const toNumber = (value) => {
            const normalized = String(value || '').replace(/[０-９]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 0xFEE0));
            const matched = normalized.match(/\d+/);
            return matched ? Number(matched[0]) : NaN;
        };

        const start = toNumber(entry?.volumeStart);
        const end = toNumber(entry?.volumeEnd);
        if (Number.isFinite(start) && Number.isFinite(end) && end >= start) return end - start + 1;
        if (Number.isFinite(start) || Number.isFinite(end)) return 1;
        return 1;
    }

    function resetCalendarForm() {
        const titleInput = document.getElementById('calendar-entry-title');
        const startInput = document.getElementById('calendar-entry-volume-start');
        const endInput = document.getElementById('calendar-entry-volume-end');
        if (titleInput) titleInput.value = '';
        if (startInput) startInput.value = '';
        if (endInput) endInput.value = '';
        hideCalendarTitleSuggestions();
    }

    function getCalendarTitleSuggestionPool() {
        const uniqueTitles = new Map();

        allRecords.forEach((record) => {
            const title = (record.title || '').trim();
            if (!title || uniqueTitles.has(title)) return;
            uniqueTitles.set(title, {
                title,
                reading: record.title_reading || ''
            });
        });

        calendarEntries.forEach((entry) => {
            const title = (entry.title || '').trim();
            if (!title || uniqueTitles.has(title)) return;
            uniqueTitles.set(title, {
                title,
                reading: ''
            });
        });

        return Array.from(uniqueTitles.values());
    }

    function getCalendarTitleSuggestions(query) {
        if (!query) return [];
        return getCalendarTitleSuggestionPool()
            .filter((item) => titleStartsWithQuery(item.title, query, item.reading))
            .slice(0, 8);
    }

    function hideCalendarTitleSuggestions() {
        const suggestions = document.getElementById('calendar-title-suggestions');
        if (!suggestions) return;
        suggestions.hidden = true;
        suggestions.innerHTML = '';
    }

    function renderCalendarTitleSuggestions(query) {
        const suggestions = document.getElementById('calendar-title-suggestions');
        if (!suggestions) return;

        const normalizedQuery = (query || '').trim();
        if (!normalizedQuery) {
            hideCalendarTitleSuggestions();
            return;
        }

        const matchedTitles = getCalendarTitleSuggestions(normalizedQuery);
        if (matchedTitles.length === 0) {
            hideCalendarTitleSuggestions();
            return;
        }

        const normalizedExactQuery = normalizeSearchText(normalizedQuery);
        const hasSingleExactMatch = matchedTitles.length === 1
            && normalizeSearchText(matchedTitles[0].title) === normalizedExactQuery;
        if (hasSingleExactMatch) {
            hideCalendarTitleSuggestions();
            return;
        }

        suggestions.hidden = false;
        suggestions.innerHTML = matchedTitles.map((item) => `
            <button type="button" class="calendar-title-suggestion" onclick="selectCalendarTitleSuggestion('${escapeAttr(item.title)}')">
                ${escapeHTML(item.title)}
            </button>
        `).join('');
    }

    function handleCalendarTitleInput() {
        const titleInput = document.getElementById('calendar-entry-title');
        renderCalendarTitleSuggestions(titleInput?.value || '');
    }

    function selectCalendarTitleSuggestion(title) {
        const titleInput = document.getElementById('calendar-entry-title');
        if (!titleInput) return;
        titleInput.value = title;
        hideCalendarTitleSuggestions();
        try {
            titleInput.focus({ preventScroll: true });
        } catch (e) {
            titleInput.focus();
        }
    }

    function isMobileLikeLayout() {
        return window.matchMedia('(max-width: 820px), (hover: none) and (pointer: coarse)').matches;
    }

    function focusCalendarTitleInput() {
        if (isMobileLikeLayout()) return;
        const titleInput = document.getElementById('calendar-entry-title');
        if (!titleInput) return;
        try {
            titleInput.focus({ preventScroll: true });
        } catch (e) {
            titleInput.focus();
        }
    }

    /**
     * スマホでカレンダーポップオーバー内のinputが1発目でキーボード入力を受け付けない問題を修正。
     * iOS Safari では、innerHTML で動的に生成された input を overlay (scroll-locked) 内で
     * タップしたとき、focus イベントは発火するがキーボードとの接続が確立されないことがある。
     * touchstart で明示的に focus() を呼び、setSelectionRange でカーソル位置を設定することで、
     * キーボードが確実に接続される。
     */
    function setupCalendarFormMobileFocus() {
        const ids = ['calendar-entry-volume-start', 'calendar-entry-volume-end', 'calendar-entry-title'];
        ids.forEach((id) => {
            const input = document.getElementById(id);
            if (!input || input._mfSetup) return;
            input._mfSetup = true;

            input.addEventListener('touchstart', (e) => {
                // 既にフォーカス中なら何もしない（通常入力を邪魔しない）
                if (document.activeElement === input) return;

                // タッチイベント後に確実にフォーカスを当てる
                // setTimeout(0) で iOS が touch → click → focus の
                // シーケンスを完了した後に改めて focus を呼ぶ
                setTimeout(() => {
                    input.focus();
                    // カーソルを末尾に配置し、キーボードの接続を確実にする
                    const len = input.value.length;
                    try {
                        input.setSelectionRange(len, len);
                    } catch (_) {
                        // setSelectionRange が使えない場合は無視
                    }
                }, 0);
            }, { passive: true });
        });
    }

    function lockCalendarBodyScroll() {
        if (document.body.dataset.calendarScrollLock === 'true') return;
        calendarState.scrollY = window.scrollY || window.pageYOffset || 0;
        if (isMobileLikeLayout()) {
            document.body.style.overflow = 'hidden';
            document.body.dataset.calendarScrollMode = 'overflow';
            document.body.dataset.calendarScrollLock = 'true';
            return;
        }
        document.body.style.position = 'fixed';
        document.body.style.top = `-${calendarState.scrollY}px`;
        document.body.style.left = '0';
        document.body.style.right = '0';
        document.body.style.width = '100%';
        document.body.style.overflow = 'hidden';
        document.body.dataset.calendarScrollMode = 'fixed';
        document.body.dataset.calendarScrollLock = 'true';
    }

    function unlockCalendarBodyScroll() {
        if (document.body.dataset.calendarScrollLock !== 'true') return;
        const scrollY = calendarState.scrollY || 0;
        const scrollMode = document.body.dataset.calendarScrollMode || '';
        if (scrollMode === 'overflow') {
            document.body.style.overflow = '';
            delete document.body.dataset.calendarScrollMode;
            delete document.body.dataset.calendarScrollLock;
            window.scrollTo(0, scrollY);
            return;
        }
        document.body.style.position = '';
        document.body.style.top = '';
        document.body.style.left = '';
        document.body.style.right = '';
        document.body.style.width = '';
        document.body.style.overflow = '';
        delete document.body.dataset.calendarScrollMode;
        delete document.body.dataset.calendarScrollLock;
        window.scrollTo(0, scrollY);
    }

    async function saveCalendarEntry() {
        const titleInput = document.getElementById('calendar-entry-title');
        const startInput = document.getElementById('calendar-entry-volume-start');
        const endInput = document.getElementById('calendar-entry-volume-end');
        if (!titleInput) return;

        const entryDate = calendarState.selectedDate;
        const title = titleInput.value.trim();
        const volumeStart = startInput?.value.trim() || '';
        const volumeEnd = endInput?.value.trim() || '';

        if (!entryDate || !title) {
            alert('カレンダーの日付を選んで、漫画タイトルを入力してください。');
            return;
        }

        const previousEntries = JSON.parse(JSON.stringify(calendarEntries));
        const editingIndex = calendarEntries.findIndex((entry) => entry.id === calendarState.editingEntryId);
        if (editingIndex >= 0) {
            calendarEntries[editingIndex] = {
                ...calendarEntries[editingIndex],
                date: entryDate,
                title,
                volumeStart,
                volumeEnd
            };
        } else {
            calendarEntries.push({
                id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
                date: entryDate,
                title,
                volumeStart,
                volumeEnd
            });
        }
        try {
            await saveCalendarEntriesToServer();
        } catch (e) {
            calendarEntries = previousEntries;
            console.error(e);
            alert(e.message || 'カレンダーの保存に失敗しました。');
            return;
        }

        const [year, month] = entryDate.split('-');
        calendarState.currentMonth = new Date(Number(year), Number(month) - 1, 1);
        calendarState.selectedDate = entryDate;
        calendarState.editingEntryId = '';
        resetCalendarForm();
        renderCalendarView();
        const nextTitleInput = document.getElementById('calendar-entry-title');
        if (nextTitleInput) nextTitleInput.focus();
    }

    async function deleteCalendarEntry(entryId) {
        try {
            const response = await fetch('/api/calendar', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: entryId })
            });

            if (!response.ok) {
                const result = await response.json().catch(() => ({}));
                throw new Error(result.error || 'カレンダーの削除に失敗しました。');
            }

            const result = await response.json().catch(() => ({}));
            applyCalendarEntries(result.entries);
        } catch (e) {
            console.error(e);
            alert(e.message || 'カレンダーの削除に失敗しました。');
            return;
        }

        if (calendarState.editingEntryId === entryId) {
            calendarState.editingEntryId = '';
        }
        renderCalendarView();
    }

    function startCalendarEntryEdit(entryId, options = {}) {
        const { fromHistory = false } = options;
        const entry = calendarEntries.find((item) => item.id === entryId);
        if (!entry) return;
        calendarState.selectedDate = entry.date;
        calendarState.editingEntryId = entryId;
        renderCalendarView();
        focusCalendarTitleInput();
        if (!fromHistory) pushCurrentHistoryState();
    }

    function cancelCalendarEntryEdit(fromHistory = false) {
        calendarState.editingEntryId = '';
        renderCalendarView();
        if (!fromHistory) syncHistoryAfterOverlayChange();
    }

    function closeCalendarEntryPopover(fromHistory = false) {
        closeCalendarEntryPopoverDirect();
        if (!fromHistory) syncHistoryAfterOverlayChange();
    }

    function clearCalendarDropTargets() {
        document.querySelectorAll('.calendar-cell.is-drop-target').forEach((element) => {
            element.classList.remove('is-drop-target');
        });
    }

    function startCalendarEntryDrag(event, entryId) {
        calendarState.dragEntryId = entryId;
        if (event.dataTransfer) {
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', entryId);
        }
    }

    function endCalendarEntryDrag() {
        calendarState.dragEntryId = '';
        clearCalendarDropTargets();
    }

    function handleCalendarCellDragOver(event) {
        const dragTypes = Array.from(event.dataTransfer?.types || []);
        if (!calendarState.dragEntryId && !dragTypes.includes('text/plain')) return;
        event.preventDefault();
        if (event.dataTransfer) event.dataTransfer.dropEffect = 'move';
        event.currentTarget.classList.add('is-drop-target');
    }

    function handleCalendarCellDragLeave(event) {
        event.currentTarget.classList.remove('is-drop-target');
    }

    async function moveCalendarEntryToDate(entryId, targetDate) {
        const entry = calendarEntries.find((item) => item.id === entryId);
        if (!entry || !targetDate || entry.date === targetDate) return false;
        const previousEntries = JSON.parse(JSON.stringify(calendarEntries));
        entry.date = targetDate;
        try {
            await saveCalendarEntriesToServer();
        } catch (e) {
            calendarEntries = previousEntries;
            console.error(e);
            alert(e.message || 'カレンダー移動の保存に失敗しました。');
            return false;
        }

        const [year, month] = targetDate.split('-');
        calendarState.currentMonth = new Date(Number(year), Number(month) - 1, 1);
        calendarState.selectedDate = targetDate;
        calendarState.isEntryPopoverOpen = false;
        calendarState.editingEntryId = '';
        unlockCalendarBodyScroll();
        return true;
    }

    async function handleCalendarEntryDrop(event, targetDate) {
        event.preventDefault();
        event.stopPropagation();
        const droppedEntryId = event.dataTransfer?.getData('text/plain') || calendarState.dragEntryId;
        clearCalendarDropTargets();
        const moved = await moveCalendarEntryToDate(droppedEntryId, targetDate);
        calendarState.suppressNextSelection = moved;
        endCalendarEntryDrag();
        if (moved) renderCalendarView();
    }

    async function fetchAllRecords(options = {}) {
        const { force = false } = options;
        if (!force && isRecordsCacheFresh()) {
            return allRecords;
        }

        if (!force && recordsFetchPromise) {
            return recordsFetchPromise;
        }

        recordsFetchPromise = (async () => {
            const response = await fetch('/api/records', { cache: 'no-store' });
            if (!response.ok) throw new Error('サーバー通信エラー');
            allRecords = await response.json();
            recordsLoadedAt = Date.now();
            return allRecords;
        })();

        try {
            return await recordsFetchPromise;
        } finally {
            recordsFetchPromise = null;
        }
    }

    function getFilteredRecordEntries(options = {}) {
        const { mode = 'records' } = options;
        const query = mode === 'next' ? (nextFilterState.query || '') : (recordsFilterState.query || '');
        const wantsNext = mode === 'next';
        return allRecords
            .map((record) => ({ record, idx: getRecordIndexByIdentity(record.title, record.date) }))
            .filter(({ record }) => ((record?.record_type || 'record') === 'next') === wantsNext)
            .filter(({ record }) => titleStartsWithQuery(record.title, query, record.title_reading || ''))
            .filter(({ record }) => mode !== 'records' || !recordsFilterState.currentlyReadingOnly || record.currently_reading);
    }

    // カード背景色生成（タイトルからハッシュ → カラフルなグラデーション）
    function generateCardGradient(title) {
        let hash = 0;
        for (let i = 0; i < title.length; i++) {
            hash = title.charCodeAt(i) + ((hash << 5) - hash);
        }
        const hue1 = Math.abs(hash) % 360;
        const hue2 = (hue1 + 40 + (Math.abs(hash >> 8) % 30)) % 360;
        return `linear-gradient(135deg, hsl(${hue1}, 55%, 45%), hsl(${hue2}, 60%, 35%))`;
    }

    // 漫画カードHTML生成（共通）records / favorites で共有
    function buildMangaCardElement(record, idx, options = {}) {
        const { allowFavorite = true } = options;
        const card = document.createElement('div');
        card.className = 'manga-card';
        card.onclick = () => openModal(idx);
        if (!allowFavorite) {
            card.draggable = true;
            card.title = '過去の記録タブへドラッグして移動';
            card.addEventListener('dragstart', (event) => {
                card.classList.add('is-pressing');
                if (event.dataTransfer) {
                    event.dataTransfer.effectAllowed = 'move';
                    event.dataTransfer.setData('application/x-manga-next-record', JSON.stringify({
                        title: record.title,
                        date: record.date
                    }));
                }
            });
            card.addEventListener('dragend', () => {
                card.classList.remove('is-pressing');
            });
        }

        const starIcon = record.favorite ? '★' : '☆';
        const starClass = record.favorite ? 'star-btn favorited' : 'star-btn';
        const readingIcon = record.currently_reading ? '📖' : '📕';
        const readingClass = record.currently_reading ? 'reading-btn reading-active' : 'reading-btn';
        const favoriteButtonHtml = allowFavorite
            ? `<button class="${starClass}" onclick="event.stopPropagation(); toggleFavorite('${escapeAttr(record.title)}', '${escapeAttr(record.date)}', this)">${starIcon}</button><button class="${readingClass}" title="今読んでいるに登録" onclick="event.stopPropagation(); toggleCurrentlyReading('${escapeAttr(record.title)}', '${escapeAttr(record.date)}', this)">${readingIcon}</button>`
            : '';

        let backgroundHtml;
        if (record.image) {
            backgroundHtml = `<div class="manga-card-cover"><img class="loading" src="${escapeHTML(record.image)}" alt="${escapeHTML(record.title)}" loading="lazy" onload="this.classList.remove('loading');this.classList.add('loaded');" onerror="this.parentElement.remove();"></div>`;
            card.style.background = generateCardGradient(record.title);
        } else {
            const initial = record.title.charAt(0) || '?';
            card.style.background = generateCardGradient(record.title);
            backgroundHtml = `<div class="manga-card-initial">${escapeHTML(initial)}</div>`;
        }

        card.innerHTML = `
            ${backgroundHtml}
            <div class="manga-card-overlay">
                <div class="manga-card-title">${escapeHTML(record.title)}</div>
                <div class="manga-card-actions">
                    ${favoriteButtonHtml}
                    <button class="edit-btn" onclick="event.stopPropagation(); openModalEdit(${idx})">✏️</button>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteRecord('${escapeAttr(record.title)}', '${escapeAttr(record.date)}')">🗑️</button>
                </div>
            </div>
        `;
        return card;
    }

    function renderRecordsGrid(entries, options = {}) {
        const { mode = 'records' } = options;
        const isNextMode = mode === 'next';
        const container = document.getElementById(isNextMode ? 'next-container' : 'records-container');
        const status = document.getElementById(isNextMode ? 'next-filter-status' : 'records-filter-status');
        const activeQuery = isNextMode ? nextFilterState.query : recordsFilterState.query;
        const isReadingFilter = !isNextMode && recordsFilterState.currentlyReadingOnly;
        const totalCount = allRecords.filter((record) => ((record?.record_type || 'record') === 'next') === isNextMode).length;
        if (!container) return;

        // 「今読んでいる」ボタンのアクティブ状態を更新
        const readingFilterBtn = document.getElementById('records-reading-filter-btn');
        if (readingFilterBtn) {
            readingFilterBtn.classList.toggle('active', isReadingFilter);
            readingFilterBtn.textContent = isReadingFilter ? '📖 今読んでいる ✓' : '📖 今読んでいる';
        }

        container.innerHTML = '';
        if (status) {
            if (isReadingFilter) {
                const readingCount = allRecords.filter((r) => (r?.record_type || 'record') !== 'next' && r.currently_reading).length;
                status.textContent = activeQuery
                    ? `${entries.length}件ヒット（今読んでいる ${readingCount}件中）`
                    : `今読んでいる: ${readingCount}件`;
            } else {
                status.textContent = activeQuery
                    ? `${entries.length}件ヒットしました / 先頭一致: 「${activeQuery}」`
                    : isNextMode ? `${totalCount}件の候補があります` : `${totalCount}件の記録があります`;
            }
        }

        if (totalCount === 0) {
            container.innerHTML = isNextMode
                ? '<div class="panel next-empty-copy" style="grid-column:1/-1;">まだ「次読みたい」はありません。<br>左のフォームから気になる作品を追加できます。</div>'
                : '<div class="panel empty-message" style="grid-column:1/-1;">まだ記録がありません。<br>感想を記録タブから入力してみましょう！</div>';
            return;
        }

        if (entries.length === 0) {
            container.innerHTML = isNextMode
                ? '<div class="panel next-empty-copy" style="grid-column:1/-1;">条件に合う作品が見つかりませんでした。<br>漫画タイトルの先頭文字を変えてみてください。</div>'
                : isReadingFilter
                    ? '<div class="panel empty-message" style="grid-column:1/-1;">今読んでいる漫画はまだありません。<br>各カードの📕ボタンで登録できます。</div>'
                    : '<div class="panel empty-message" style="grid-column:1/-1;">条件に合う記録が見つかりませんでした。<br>漫画タイトルの先頭文字を変えてみてください。</div>';
            return;
        }

        entries.forEach(({ record, idx }) => {
            container.appendChild(buildMangaCardElement(record, idx, { allowFavorite: !isNextMode }));
        });
    }

    function handleRecordsFilterChange(mode = 'records') {
        if (mode === 'next') {
            nextFilterState.query = document.getElementById('next-search-input')?.value || '';
        } else {
            recordsFilterState.query = document.getElementById('records-search-input')?.value || '';
        }
        renderRecordsGrid(getFilteredRecordEntries({ mode }), { mode });
    }

    function toggleCurrentlyReadingFilter() {
        recordsFilterState.currentlyReadingOnly = !recordsFilterState.currentlyReadingOnly;
        renderRecordsGrid(getFilteredRecordEntries({ mode: 'records' }), { mode: 'records' });
    }

    function resetRecordsFilters(mode = 'records') {
        const searchInput = document.getElementById(mode === 'next' ? 'next-search-input' : 'records-search-input');
        if (searchInput) searchInput.value = '';
        if (mode === 'next') {
            nextFilterState.query = '';
        } else {
            recordsFilterState.query = '';
            recordsFilterState.currentlyReadingOnly = false;
        }
        renderRecordsGrid(getFilteredRecordEntries({ mode }), { mode });
    }

    function buildCalendarDataMap() {
        const map = new Map();
        calendarEntries.forEach((entry) => {
            if (!entry.date) return;
            if (!map.has(entry.date)) map.set(entry.date, []);
            map.get(entry.date).push(entry);
        });
        return map;
    }

    function ensureCalendarSelection(recordsByDate) {
        const monthPrefix = `${calendarState.currentMonth.getFullYear()}-${pad2(calendarState.currentMonth.getMonth() + 1)}`;
        const currentSelected = calendarState.selectedDate || '';
        if (currentSelected.startsWith(monthPrefix)) return;

        const todayIso = getTodayIso();
        if (todayIso.startsWith(monthPrefix)) {
            calendarState.selectedDate = todayIso;
            return;
        }

        calendarState.selectedDate = `${monthPrefix}-01`;
    }

    function renderCalendarView() {
        const root = document.getElementById('calendar-root');
        const popoverRoot = document.getElementById('calendar-popover-root');
        const monthLabel = document.getElementById('calendar-month-label');
        if (!root || !popoverRoot || !monthLabel) return;

        monthLabel.textContent = formatMonthLabel(calendarState.currentMonth);

        const recordsByDate = buildCalendarDataMap();
        ensureCalendarSelection(recordsByDate);

        const year = calendarState.currentMonth.getFullYear();
        const month = calendarState.currentMonth.getMonth();
        const firstDay = new Date(year, month, 1);
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const startWeekday = firstDay.getDay();
        const todayIso = getTodayIso();
        const chartSeries = Array.from({ length: daysInMonth }, (_item, index) => {
            const day = index + 1;
            const isoDate = `${year}-${pad2(month + 1)}-${pad2(day)}`;
            const entries = recordsByDate.get(isoDate) || [];
            const count = entries.reduce((sum, entry) => sum + countVolumesForEntry(entry), 0);
            return { day, isoDate, count };
        });
        const chartMax = Math.max(1, ...chartSeries.map((item) => item.count));

        const weekdayHtml = [
            { label: '日', className: 'is-sunday' },
            { label: '月', className: '' },
            { label: '火', className: '' },
            { label: '水', className: '' },
            { label: '木', className: '' },
            { label: '金', className: '' },
            { label: '土', className: 'is-saturday' }
        ]
            .map(({ label, className }) => `<div class="calendar-weekday ${className}">${label}</div>`)
            .join('');

        let cellHtml = '';
        for (let i = 0; i < startWeekday; i += 1) {
            cellHtml += '<div class="calendar-cell is-outside"></div>';
        }

        for (let day = 1; day <= daysInMonth; day += 1) {
            const isoDate = `${year}-${pad2(month + 1)}-${pad2(day)}`;
            const dayEntries = recordsByDate.get(isoDate) || [];
            const classes = ['calendar-cell'];
            const weekdayIndex = new Date(year, month, day).getDay();
            if (weekdayIndex === 0) classes.push('is-sunday');
            if (weekdayIndex === 6) classes.push('is-saturday');
            if (dayEntries.length > 0) classes.push('has-records');
            if (calendarState.selectedDate === isoDate) classes.push('is-selected');
            if (todayIso === isoDate) classes.push('is-today');

            const entryHtml = dayEntries.length > 0
                ? `<div class="calendar-cell-entries">
                    ${dayEntries.map((entry) => `
                        <div
                            class="calendar-cell-entry"
                            draggable="true"
                            ondragstart="startCalendarEntryDrag(event, '${entry.id}')"
                            ondragend="endCalendarEntryDrag()"
                        >
                            <div class="calendar-cell-entry-title">${escapeHTML(entry.title)}</div>
                            <div class="calendar-cell-entry-volume">${escapeHTML(formatVolumeRange(entry))}</div>
                        </div>
                    `).join('')}
                </div>`
                : '<div class="calendar-cell-empty">クリックして記録</div>';

            cellHtml += `
                <button
                    type="button"
                    class="${classes.join(' ')}"
                    onclick="selectCalendarDate('${isoDate}')"
                    ondragover="handleCalendarCellDragOver(event)"
                    ondragleave="handleCalendarCellDragLeave(event)"
                    ondrop="handleCalendarEntryDrop(event, '${isoDate}')"
                >
                    <div class="calendar-cell-header">
                        <div class="calendar-day-number">${day}</div>
                        ${dayEntries.length > 0 ? `<div class="calendar-count-badge">${dayEntries.length}冊</div>` : ''}
                    </div>
                    ${entryHtml}
                </button>
            `;
        }

        const trailingOutsideCells = (7 - ((startWeekday + daysInMonth) % 7)) % 7;
        for (let i = 0; i < trailingOutsideCells; i += 1) {
            cellHtml += '<div class="calendar-cell is-outside"></div>';
        }

        const selectedEntries = calendarState.selectedDate ? (recordsByDate.get(calendarState.selectedDate) || []) : [];
        const editingEntry = calendarEntries.find((entry) => entry.id === calendarState.editingEntryId) || null;
        const popoverHtml = calendarState.isEntryPopoverOpen
            ? `
                <div class="calendar-entry-overlay" onclick="if(event.target===this) closeCalendarEntryPopover()">
                    <div class="calendar-entry-panel">
                        <div class="calendar-entry-header">
                            <div>
                                <h3>${formatSelectedDateLabel(calendarState.selectedDate)}</h3>
                                <div class="calendar-selected-note">${editingEntry ? '登録内容を修正できます。保存するとこの記録が更新されます。' : 'この日付に複数の漫画を追加できます。'}</div>
                            </div>
                            <button type="button" class="calendar-entry-close" onclick="closeCalendarEntryPopover()">✕</button>
                        </div>
                        <div class="calendar-form">
                            <div class="calendar-title-field">
                                <input type="text" id="calendar-entry-title" placeholder="漫画タイトル" value="${escapeAttr(editingEntry?.title || '')}" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="search" enterkeyhint="done" oninput="handleCalendarTitleInput()">
                                <div id="calendar-title-suggestions" class="calendar-title-suggestions" hidden></div>
                            </div>
                            <input type="text" id="calendar-entry-volume-start" placeholder="巻数" value="${escapeAttr(editingEntry?.volumeStart || '')}" autocomplete="off" inputmode="numeric" enterkeyhint="next" onfocus="hideCalendarTitleSuggestions()">
                            <input type="text" id="calendar-entry-volume-end" placeholder="終了巻（任意）" value="${escapeAttr(editingEntry?.volumeEnd || '')}" autocomplete="off" inputmode="numeric" enterkeyhint="done" onfocus="hideCalendarTitleSuggestions()">
                            <button type="button" class="calendar-form-submit" onclick="saveCalendarEntry()">${editingEntry ? '修正を保存' : '登録する'}</button>
                            ${editingEntry ? '<button type="button" class="calendar-form-reset" onclick="cancelCalendarEntryEdit()">キャンセル</button>' : ''}
                        </div>
                        <div class="calendar-form-note">${editingEntry ? '例: 1巻だけなら左だけ入力、複数巻なら右にも入力して「修正を保存」を押してください。' : '例: 12巻だけなら左だけ入力 / 12巻〜14巻なら右にも入力'}</div>
                        ${selectedEntries.length > 0
                            ? `<div class="calendar-record-list">
                                ${selectedEntries.map((entry) => `
                                    <div class="calendar-record-card">
                                        <div class="calendar-record-title">${escapeHTML(entry.title)}</div>
                                        <div class="calendar-record-volume">${escapeHTML(formatVolumeRange(entry))}</div>
                                        <div class="calendar-record-meta">${escapeHTML(entry.date)}</div>
                                        <div class="calendar-record-actions">
                                            <button type="button" class="calendar-record-edit" onclick="startCalendarEntryEdit('${entry.id}')">修正</button>
                                            <button type="button" class="calendar-record-delete" onclick="deleteCalendarEntry('${entry.id}')">削除</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>`
                            : '<div class="empty-message" style="padding:20px 0;">まだ登録がありません。上の入力欄から追加できます。</div>'}
                    </div>
                </div>
            `
            : '';

        root.innerHTML = `
            <div class="calendar-stage">
                <div class="calendar-grid">
                    ${weekdayHtml}
                    ${cellHtml}
                </div>
            </div>
            <div class="calendar-chart-panel">
                <div class="calendar-chart-header">
                    <div class="calendar-chart-title">読んだ巻数グラフ</div>
                    <div class="calendar-chart-note">横軸: 日付 / 縦軸: その日に読んだ巻数</div>
                </div>
                <div class="calendar-chart-scroll">
                    <div class="calendar-chart">
                        ${chartSeries.map((item) => `
                            <div class="calendar-chart-bar-group" title="${item.isoDate}: ${item.count}巻">
                                <div class="calendar-chart-bar-value">${item.count > 0 ? `${item.count}` : ''}</div>
                                <div
                                    class="calendar-chart-bar ${item.count === 0 ? 'is-zero' : ''}"
                                    style="height:${Math.max(item.count === 0 ? 8 : 14, (item.count / chartMax) * 150)}px"
                                ></div>
                                <div class="calendar-chart-label">${item.day}日</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
        popoverRoot.innerHTML = popoverHtml;

        // スマホ: 動的生成されたinputに対してiOSキーボード接続を確実にする
        if (calendarState.isEntryPopoverOpen) {
            setupCalendarFormMobileFocus();
        }
    }

    function selectCalendarDate(isoDate, options = {}) {
        const { fromHistory = false } = options;
        if (calendarState.suppressNextSelection) {
            calendarState.suppressNextSelection = false;
            return;
        }
        calendarState.selectedDate = isoDate;
        calendarState.isEntryPopoverOpen = true;
        calendarState.editingEntryId = '';
        lockCalendarBodyScroll();
        renderCalendarView();
        focusCalendarTitleInput();
        if (!fromHistory) pushCurrentHistoryState();
    }

    function changeCalendarMonth(offset, options = {}) {
        const { fromHistory = false } = options;
        calendarState.currentMonth = new Date(calendarState.currentMonth.getFullYear(), calendarState.currentMonth.getMonth() + offset, 1);
        calendarState.selectedDate = '';
        calendarState.isEntryPopoverOpen = false;
        calendarState.editingEntryId = '';
        unlockCalendarBodyScroll();
        renderCalendarView();
        if (!fromHistory) pushCurrentHistoryState();
    }

    function jumpCalendarToToday(options = {}) {
        const { fromHistory = false } = options;
        const todayIso = getTodayIso();
        const [year, month] = todayIso.split('-');
        calendarState.currentMonth = new Date(Number(year), Number(month) - 1, 1);
        calendarState.selectedDate = todayIso;
        calendarState.isEntryPopoverOpen = false;
        calendarState.editingEntryId = '';
        unlockCalendarBodyScroll();
        renderCalendarView();
        if (!fromHistory) pushCurrentHistoryState();
    }

    // ===== 記録読み込み（グリッド） =====
    async function loadRecords(options = {}) {
        const { force = false, mode = 'records' } = options;
        const container = document.getElementById(mode === 'next' ? 'next-container' : 'records-container');
        try {
            if (allRecords.length > 0 && !force) {
                renderRecordsGrid(getFilteredRecordEntries({ mode }), { mode });
            }
            await fetchAllRecords({ force });
            renderRecordsGrid(getFilteredRecordEntries({ mode }), { mode });
        } catch (e) {
            console.error(e);
            container.innerHTML = '<div class="panel" style="grid-column:1/-1;color:red;text-align:center;font-weight:bold;font-size:1.2rem;padding:32px;">通信エラー</div>';
        }
    }

    function getActiveTabId() {
        return document.querySelector('.tab-content.active')?.id?.replace('tab-', '') || 'records';
    }

    async function refreshVisibleRecordViews(options = {}) {
        const { force = false } = options;
        const activeTabId = getActiveTabId();
        if (activeTabId === 'favorites') {
            await loadFavorites({ force });
            return;
        }
        await loadRecords({ force, mode: activeTabId === 'next' ? 'next' : 'records' });
    }

    async function moveNextRecordToRecords(title, date) {
        const record = allRecords.find((item) => item.title === title && item.date === date);
        if (!record || (record.record_type || 'record') !== 'next') return;

        try {
            const resp = await fetch('/api/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    orig_title: record.title,
                    orig_date: record.date,
                    record_type: 'record',
                    title: record.title,
                    quote: '',
                    quote_speaker: '',
                    thoughts: '',
                    summary: '',
                    tag: ''
                })
            });
            if (!resp.ok) {
                const result = await resp.json().catch(() => ({}));
                throw new Error(result.error || '移動に失敗しました。');
            }

            invalidateRecordsCache();
            await fetchAllRecords({ force: true });
            await switchTab('records');
        } catch (e) {
            console.error(e);
            alert(e.message || '移動に失敗しました。');
        }
    }

    async function deleteRecord(title, date) {
        if (!title || !date) return;
        const shouldDelete = window.confirm(`「${title}」の記録を削除しますか？`);
        if (!shouldDelete) return;

        try {
            const resp = await fetch('/api/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, date })
            });
            const result = await resp.json().catch(() => ({}));
            if (!resp.ok) {
                alert(result.error || '削除に失敗しました。');
                return;
            }

            closeModal();
            invalidateRecordsCache();
            await refreshVisibleRecordViews({ force: true });
        } catch (e) {
            console.error(e);
            alert('通信エラーで削除できませんでした。');
        }
    }

    function deleteRecordByIndex(idx) {
        const record = allRecords[idx];
        if (!record) return;
        deleteRecord(record.title, record.date);
    }

    function openImageLightbox(src, alt = '', options = {}) {
        const { fromHistory = false } = options;
        const overlay = document.getElementById('image-lightbox');
        const image = document.getElementById('image-lightbox-img');
        if (!overlay || !image || !src) return;
        currentLightboxState = { src, alt };
        image.src = src;
        image.alt = alt || '拡大画像';
        overlay.classList.add('active');
        if (!fromHistory) pushCurrentHistoryState();
    }

    function closeImageLightbox(fromHistory = false) {
        closeImageLightboxDirect();
        if (!fromHistory) syncHistoryAfterOverlayChange();
    }

    async function loadCalendarView() {
        const root = document.getElementById('calendar-root');
        try {
            if (!allRecords.length) {
                try {
                    await fetchAllRecords();
                } catch (e) {
                    console.warn('calendar title suggestions unavailable', e);
                }
            }
            await loadCalendarEntries();
            renderCalendarView();
        } catch (e) {
            console.error(e);
            root.innerHTML = '<div class="panel" style="color:red;text-align:center;font-weight:bold;font-size:1.2rem;padding:32px;">通信エラー</div>';
        }
    }

    // ギャラリー部分のHTML生成とイベント付着（部分更新用）
    function updateGalleryUI(idx) {
        const record = allRecords[idx];
        if (!record) return;
        const leftPanel = document.querySelector('.modal-left');
        if (!leftPanel) return;

        const gallery = record.gallery || [];
        let galleryItemsHtml = '';
        gallery.forEach((imgPath) => {
            galleryItemsHtml += `
                <div class="gallery-item" draggable="true" ondragstart="event.dataTransfer.setData('application/x-manga-gallery-image', '${imgPath}')">
                    <img src="${imgPath}" alt="ギャラリー画像" class="previewable-image" data-preview-src="${escapeAttr(imgPath)}" data-preview-alt="${escapeAttr(record.title)} のギャラリー画像" loading="lazy" decoding="async">
                    <button class="gallery-remove" onclick="event.stopPropagation(); removeGalleryImage(${idx}, '${escapeAttr(imgPath)}')" title="この画像を削除">✕</button>
                </div>`;
        });

        const canAdd = gallery.length < 3;
        const dropzoneHtml = canAdd ? `
            <div class="gallery-dropzone" id="gallery-dropzone">
                📷 画像をドラッグ＆ドロップ<br><small>または検索から追加（残り${3 - gallery.length}枚）</small>
            </div>` : '';

        leftPanel.innerHTML = `
            <div style="font-weight:900; font-size:1.1rem; color:var(--text-muted); margin-bottom:4px;">📸 ギャラリー <span class="gallery-count">(${gallery.length}/3)</span></div>
            <div class="gallery-grid">
                ${galleryItemsHtml || '<div style="color:var(--text-muted); text-align:center; padding:24px; font-size:0.95rem;">まだ画像がありません</div>'}
            </div>
            ${dropzoneHtml}
        `;

        // ドロップゾーンのイベント設定
        const dz = document.getElementById('gallery-dropzone');
        if (dz) {
            dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('dragover'); });
            dz.addEventListener('dragleave', (e) => { e.preventDefault(); dz.classList.remove('dragover'); });
            dz.addEventListener('drop', (e) => {
                e.preventDefault(); e.stopPropagation();
                dz.classList.remove('dragover');

                const ddgImageUrl = e.dataTransfer.getData('application/x-ddg-image');
                if (ddgImageUrl) {
                    applySearchImage(idx, ddgImageUrl, { target: 'gallery-next' });
                    return;
                }

                const mainImagePath = e.dataTransfer.getData('application/x-manga-main-image');
                if (mainImagePath) {
                    // 表紙画像をギャラリーに追加
                    // プロキシを介さずそのままでも良いが、Base64に変換して再保存する
                    const img = new Image();
                    img.crossOrigin = 'Anonymous';
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; canvas.height = img.height;
                        canvas.getContext('2d').drawImage(img, 0, 0);
                        addGalleryImage(idx, canvas.toDataURL('image/png'));
                    };
                    img.src = mainImagePath;
                    return;
                }

                if (e.dataTransfer.files.length > 0) {
                    const file = e.dataTransfer.files[0];
                    if (!file.type.startsWith('image/')) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => addGalleryImage(idx, ev.target.result);
                    reader.readAsDataURL(file);
                }
            });
        }

        leftPanel.querySelectorAll('.gallery-item img').forEach((imgEl) => {
            imgEl.addEventListener('click', (event) => {
                event.stopPropagation();
                openImageLightbox(imgEl.dataset.previewSrc || imgEl.getAttribute('src') || '', imgEl.dataset.previewAlt || imgEl.alt || '');
            });
        });
    }

    // ===== モーダル表示（2パネル: 左=ギャラリー, 右=感想） =====
    function openModal(idx, options = {}) {
        const { fromHistory = false, replaceHistory = false } = options;
        const record = allRecords[idx];
        if (!record) return;
        const isNext = (record?.record_type || 'record') === 'next';
        const modal = document.getElementById('modal-overlay');
        const body = document.getElementById('modal-body');
        currentModalState = { type: 'view', title: record.title, date: record.date };

        // 右パネル（既存コンテンツ）
        const imgHtml = record.image
            ? `<img src="${record.image}" class="acc-content-image previewable-image" id="main-image-dropzone" alt="漫画画像" title="ドラッグ＆ドロップで表紙を変更 / 表紙をギャラリーへ / タップで拡大" loading="eager" decoding="async"
                draggable="true" ondragstart="event.dataTransfer.setData('application/x-manga-main-image', '${record.image}')"
                style="cursor:grab; transition:all 0.2s;">`
            : `<div class="gallery-dropzone" id="main-image-dropzone" style="margin-bottom: 24px; min-height:150px;">ここに表紙画像をドラッグ＆ドロップ</div>`;
        const quoteEntries = getRecordQuoteEntries(record);
        const quoteHtml = quoteEntries.length > 0
            ? quoteEntries.map((entry) => `
                <div class="acc-quote">
                    「${escapeHTML(entry.text)}」
                    ${entry.speaker ? `<div class="acc-quote-speaker">-${escapeHTML(entry.speaker)}</div>` : ''}
                </div>
            `).join('')
            : '';
                let summaryHtml = '';
                if (record.summary) {
                    const items = record.summary
                        .split('\n')
                        .map(l => l.trim())
                        .filter(Boolean)
                        .map(l => l.replace(/^[-・*]\s*/,''))
                        .filter(Boolean);
                    if (items.length > 0) {
                        summaryHtml = `
                            <div style="margin-top:16px;">
                                <div style="font-weight:900; color:var(--primary-hover); margin-bottom:8px;">箇条書きまとめ</div>
                                <ul style="padding-left:20px; margin:0;">
                                    ${items.map(i => `<li>${escapeHTML(i)}</li>`).join('')}
                                </ul>
                            </div>`;
                    }
                }

                const tagHtml = record.tag ? `<div class="acc-tag">#${escapeHTML(record.tag)}</div>` : '';
                const thoughtsHtml = record.thoughts
                    ? `<div class="acc-thoughts">${escapeHTML(record.thoughts).replace(/\n/g, '<br>')}</div>`
                    : `<div class="acc-thoughts" style="color:var(--text-muted);">${isNext ? 'まだメモはありません。' : '感想はまだありません。'}</div>`;
                const summaryButtonHtml = isNext ? '' : `
                    <button class="btn-ai-generate" type="button" onclick="generateSummaryForModal(${idx}, this)">
                        🧠 AIでまとめる
                    </button>
                `;

        body.innerHTML = `
            <div class="modal-dual">
                <div class="modal-left"></div>
                <div class="modal-right">
                    <div class="modal-title">${escapeHTML(record.title)}</div>
                    <div class="modal-date">${isNext ? '次に読みたい作品' : escapeHTML(record.date)}</div>
                    ${imgHtml}
                    ${quoteHtml}
                    ${thoughtsHtml}
                    ${tagHtml}
                    ${summaryHtml}
                    ${summaryButtonHtml}
                    <div class="modal-action-row" style="margin-top:20px; display:flex; gap:12px; flex-wrap:wrap;">
                        <button class="edit-btn" onclick="openModalEditFromDetail(${idx})">✏️ 編集する</button>
                        <button class="edit-btn" style="background:rgba(16,185,129,0.1); color:var(--primary-color); border-color:rgba(16,185,129,0.2);" onclick="toggleSearchPanel(${idx})">🔍 画像を検索</button>
                        <button class="delete-btn" onclick="deleteRecordByIndex(${idx})">🗑️ 削除する</button>
                    </div>
                    <div id="search-panel-area"></div>
                </div>
            </div>
        `;
        body.dataset.idx = idx;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden'; // 背景のスクロールをロック

        // ギャラリー部分のレンダリング
        updateGalleryUI(idx);

        // 右パネルのメイン画像ドロップゾーン（ローカル / ギャラリー / 検索結果）
        const mz = document.getElementById('main-image-dropzone');
        if (mz) {
            if (mz.tagName === 'IMG') {
                mz.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openImageLightbox(record.image, `${record.title} の表紙画像`);
                });
            }
            mz.addEventListener('dragover', (e) => { e.preventDefault(); mz.style.opacity = '0.5'; mz.style.outline = '4px dashed var(--primary-color)'; });
            mz.addEventListener('dragleave', (e) => { e.preventDefault(); mz.style.opacity = '1'; mz.style.outline = 'none'; });
            mz.addEventListener('drop', async (e) => {
                e.preventDefault(); e.stopPropagation();
                mz.style.opacity = '1'; mz.style.outline = 'none';
                
                // 1. 検索結果からのドラッグ
                const ddgImageUrl = e.dataTransfer.getData('application/x-ddg-image');
                if (ddgImageUrl) {
                    applySearchImage(idx, ddgImageUrl, { target: 'main' });
                    return;
                }

                // 2. ギャラリーからのドラッグ
                const galleryImagePath = e.dataTransfer.getData('application/x-manga-gallery-image');
                if (galleryImagePath) {
                    await setMainImage(idx, { keep_image: galleryImagePath });
                    return;
                }

                // 3. ローカルファイル
                if (e.dataTransfer.files.length > 0) {
                    const file = e.dataTransfer.files[0];
                    if (!file.type.startsWith('image/')) return;
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        await setMainImage(idx, { image: ev.target.result });
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
        if (!fromHistory) {
            if (replaceHistory) {
                syncHistoryAfterOverlayChange();
            } else {
                pushCurrentHistoryState();
            }
        }
    }

    // 表紙画像の設定（共通ヘルパー）
    async function setMainImage(idx, imgData) {
        const record = allRecords[idx];
        if (!record) return false;

        // Ctrl+Zのために履歴保存
        imageHistory.push({ idx, prevImage: record.image || '', title: record.title, date: record.date });

        try {
            const saveResp = await fetch('/api/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    orig_title: record.title, orig_date: record.date,
                    record_type: record.record_type || 'record',
                    title: record.title, quote: record.quote, quote_speaker: record.quote_speaker || '', thoughts: record.thoughts, summary: record.summary, tag: record.tag,
                    ...imgData
                })
            });
            if (saveResp.ok) {
                invalidateRecordsCache();
                await fetchAllRecords({ force: true });
                const refreshedIdx = getRecordIndexByIdentity(record.title, record.date);
                openModal(refreshedIdx >= 0 ? refreshedIdx : idx);
                return true;
            } else {
                imageHistory.pop();
                alert('更新失敗');
                return false;
            }
        } catch(err) {
            imageHistory.pop();
            alert('通信エラー');

    // ===== 画像検索機能 =====
    let imageSearchController = null;
    let imageSearchRequestId = 0;

    function normalizeImageSearchQuery(query) {
        return String(query || '').trim().replace(/\s+/g, ' ');
    }

    function getCachedImageSearchResults(query) {
        const cacheKey = normalizeImageSearchQuery(query).toLowerCase();
        if (!cacheKey) {
            return null;
        }

        const cached = imageSearchCache.get(cacheKey);
        if (!cached) {
            return null;
        }

        if (Date.now() - cached.timestamp > IMAGE_SEARCH_CACHE_TTL_MS) {
            imageSearchCache.delete(cacheKey);
            return null;
        }

        return cached.results;
    }

    function cacheImageSearchResults(query, results) {
        const cacheKey = normalizeImageSearchQuery(query).toLowerCase();
        if (!cacheKey || !Array.isArray(results) || results.length === 0) {
            return;
        }

        imageSearchCache.set(cacheKey, {
            timestamp: Date.now(),
            results
        });
    }

    function getImagePlacementSlots(record) {
        const gallery = Array.isArray(record?.gallery) ? record.gallery : [];
        return [
            {
                target: 'main',
                slotIndex: -1,
                slotNumber: 1,
                label: '表紙',
                image: record?.image || '',
                enabled: true,
                actionLabel: record?.image ? '差し替え' : 'ここに配置',
                note: record?.image ? '今の表紙をこの画像に置き換えます。' : 'この画像を表紙として設定します。'
            },
            ...Array.from({ length: 3 }, (_item, index) => {
                const image = gallery[index] || '';
                const enabled = index <= gallery.length;
                const isNextEmpty = !image && index === gallery.length;
                return {
                    target: 'gallery',
                    slotIndex: index,
                    slotNumber: index + 2,
                    label: `サブ${index + 1}`,
                    image,
                    enabled,
                    actionLabel: image ? '差し替え' : (isNextEmpty ? 'ここに追加' : '未選択'),
                    note: image
                        ? `今のサブ${index + 1}をこの画像に差し替えます。`
                        : (isNextEmpty ? `この画像をサブ${index + 1}へ追加します。` : '左側の空き枠から順番に使えます。')
                };
            })
        ];
    }

                    </div>

    function openImagePlacementPicker(idx, imageUrl, imageTitle = '') {
        imagePlacementState.idx = idx;
        imagePlacementState.imageUrl = String(imageUrl || '').trim();
        imagePlacementState.imageTitle = String(imageTitle || '').trim();
        imagePlacementState.isApplying = false;
        renderImagePlacementPicker();
    }

    async function chooseImagePlacement(target, slotIndex) {
        if (imagePlacementState.isApplying) {
            return;
        }

        imagePlacementState.isApplying = true;
        renderImagePlacementPicker();

        const placement = target === 'main'
            ? { target: 'main', closePicker: false }
            : { target: 'gallery-slot', slotIndex, closePicker: false };

        const succeeded = await applySearchImage(
            imagePlacementState.idx,
            imagePlacementState.imageUrl,
            placement
        );

        if (succeeded) {
            closeImagePlacementPicker(true);
            return;
        }

        imagePlacementState.isApplying = false;
        renderImagePlacementPicker();
    }

    function handleSearchThumbLoad(imageEl) {
        if (!imageEl) return;
        imageEl.hidden = false;
        imageEl.closest('.search-thumb')?.classList.remove('is-unavailable');
    }

    function handleSearchThumbError(imageEl) {
        if (!imageEl) return;

        const fallbackSrc = imageEl.dataset.fallbackSrc || '';
        if (fallbackSrc && imageEl.dataset.fallbackUsed !== 'true' && imageEl.currentSrc !== fallbackSrc) {
            imageEl.dataset.fallbackUsed = 'true';
            imageEl.src = fallbackSrc;
            return;
        }

        imageEl.hidden = true;
        const card = imageEl.closest('.search-thumb');
        if (card) {
            card.classList.add('is-unavailable');
            card.onclick = null;
        }
    }

    function renderImageSearchResults(idx, results) {
        const container = document.getElementById('search-results-container');
        if (!container) return;

        if (!Array.isArray(results) || results.length === 0) {
            container.innerHTML = '<div class="search-loading">画像が見つかりませんでした。キーワードを変えて再検索してみてください。</div>';
            return;
        }

        container.innerHTML = '<div class="search-results"></div>';
        const grid = container.querySelector('.search-results');

        results.forEach((img) => {
            const primaryThumb = img.thumbnail || img.image;
            const fullImage = img.image || primaryThumb;
            const thumb = document.createElement('div');
            thumb.className = 'search-thumb';
            thumb.title = (img.title || '検索画像') + ' / タップして配置';
            thumb.onclick = () => openImagePlacementPicker(idx, fullImage, img.title || '');
            thumb.innerHTML = `
                <span class="search-thumb-badge">${escapeHTML(img.source || '画像検索')}</span>
                <img
                    src="/api/image-proxy?url=${encodeURIComponent(primaryThumb)}"
                    data-fallback-src="/api/image-proxy?url=${encodeURIComponent(fullImage)}"
                    alt="${escapeAttr(img.title || '')}"
                    loading="lazy"
                    decoding="async"
                    onload="handleSearchThumbLoad(this)"
                    onerror="handleSearchThumbError(this)"
                    draggable="true"
                    ondragstart="event.dataTransfer.setData('application/x-ddg-image', '${escapeAttr(fullImage)}')"
                >
                <div class="search-thumb-caption">タップして配置</div>
            `;
            grid.appendChild(thumb);
        });
    }

    async function blobToDataUrl(blob) {
        return await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onerror = () => reject(new Error('画像データの読み込みに失敗しました。'));
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(blob);
        });
    }

    function toggleSearchPanel(idx) {
        const area = document.getElementById('search-panel-area');
        if (!area) return;

        if (area.querySelector('.search-panel')) {
            if (imageSearchController) {
                imageSearchController.abort();
                imageSearchController = null;
            }
            closeImagePlacementPicker(true);
            area.innerHTML = '';
            return;
        }
        const record = allRecords[idx];
        const defaultQuery = record ? record.title + ' 漫画' : '';
        area.innerHTML = `
            <div class="search-panel">
                <div class="search-bar">
                    <input type="text" id="search-query" value="${escapeAttr(defaultQuery)}" placeholder="検索キーワードを入力..."
                           onkeydown="if(event.key==='Enter'){event.preventDefault(); searchImages(${idx});}">
                    <button onclick="searchImages(${idx})">🔍 検索</button>
                </div>
                <div id="search-results-container"><div class="search-loading">🔍 画像を検索中...</div></div>
            </div>
        `;

        area.scrollIntoView({ block: 'nearest', behavior: 'auto' });

        const input = document.getElementById('search-query');
        if (input && !isMobileLikeLayout()) {
            input.focus();
        }

        requestAnimationFrame(() => {
            void searchImages(idx);
        });

    async function searchImages(idx) {
        const queryInput = document.getElementById('search-query');
        if (!queryInput) return;
        const query = normalizeImageSearchQuery(queryInput.value);
        if (!query) return;

        if (imageSearchController) {
            imageSearchController.abort();
        }

        const requestId = imageSearchRequestId + 1;
        imageSearchRequestId = requestId;

        const container = document.getElementById('search-results-container');
        const searchButton = document.querySelector('#search-panel-area .search-bar button');
        if (!container) return;
        container.innerHTML = '<div class="search-loading">🔍 画像を検索中...</div>';
        if (searchButton) {
            searchButton.disabled = true;
            searchButton.textContent = '検索中...';
        }

        let timeoutId = 0;
        try {
            const cachedResults = getCachedImageSearchResults(query);
            if (cachedResults) {
                renderImageSearchResults(idx, cachedResults);
                return;
            }

            imageSearchController = new AbortController();
            timeoutId = setTimeout(() => imageSearchController?.abort(), 15000);
            const resp = await fetch('/api/image-search?q=' + encodeURIComponent(query), {
                cache: 'no-store',
                signal: imageSearchController.signal
            });
            clearTimeout(timeoutId);
            if (requestId !== imageSearchRequestId) {
                return;
            }
            if (!resp.ok) {
                throw new Error('画像検索に失敗しました。');
            }
            const results = await resp.json();
            cacheImageSearchResults(query, results);
            renderImageSearchResults(idx, results);
        } catch (e) {
            if (e.name === 'AbortError') {
                container.innerHTML = '<div class="search-loading" style="color:var(--danger-color);">検索がタイムアウトしました。もう一度お試しください。</div>';
                return;
            }
            console.error(e);
            container.innerHTML = '<div class="search-loading" style="color:var(--danger-color);">検索中にエラーが発生しました。</div>';
        } finally {
            if (timeoutId) {
                clearTimeout(timeoutId);
            }
            if (requestId === imageSearchRequestId) {
                imageSearchController = null;
            }
            if (searchButton) {
                searchButton.disabled = false;
                searchButton.textContent = '🔍 検索';
            }
        }
    }

    function normalizeImagePlacementOption(option) {
        if (option === true) {
            return { target: 'main', slotIndex: -1, closePicker: true };
        }

        if (!option) {
            return { target: 'prompt', slotIndex: -1, closePicker: true };
        }

        if (typeof option === 'string') {
            return { target: option, slotIndex: -1, closePicker: true };
        }

        return {
            target: option.target || 'prompt',
            slotIndex: Number.isInteger(option.slotIndex) ? option.slotIndex : -1,
            closePicker: option.closePicker !== false
        };
    }

    async function applySearchImage(idx, imageUrl, placementOption = null) {
        const record = allRecords[idx];
        if (!record || !imageUrl) return false;
        const placement = normalizeImagePlacementOption(placementOption);

        if (placement.target === 'prompt') {
            openImagePlacementPicker(idx, imageUrl, record.title || '');
            return false;
        }

        if (placement.target === 'gallery-next' && (record.gallery || []).length >= 3) {
            alert('ギャラリーは最大3枚です。先に画像を削除してください。');
            return false;
        }

        if (placement.target === 'gallery-slot' && placement.slotIndex > (record.gallery || []).length) {
            alert('左の空き枠から順番に追加してください。');
            return false;
        }

        const countLabel = document.querySelector('.gallery-count');
        const originalText = countLabel ? countLabel.innerText : '';
        if (countLabel) countLabel.innerText = placement.target === 'main' ? '(表紙保存中...)' : '(ギャラリー保存中...)';

        try {
            const resp = await fetch('/api/image-proxy?url=' + encodeURIComponent(imageUrl), {
                cache: 'no-store'
            });
            if (!resp.ok) throw new Error('画像の取得に失敗');

            const blob = await resp.blob();
            const b64 = await blobToDataUrl(blob);
            let succeeded = false;

            if (placement.target === 'main') {
                succeeded = await setMainImage(idx, { image: b64 });
            } else if (placement.target === 'gallery-slot') {
                succeeded = await placeGalleryImage(idx, placement.slotIndex, b64);
            } else {
                succeeded = await addGalleryImage(idx, b64);
            }

            if (!succeeded) {
                if (countLabel) countLabel.innerText = originalText;
                return false;
            }

            if (countLabel) countLabel.innerText = originalText;
            if (placement.closePicker) {
                closeImagePlacementPicker(true);
            }
            return true;
        } catch (e) {
            console.error(e);
            if (countLabel) countLabel.innerText = originalText;
            alert('画像の取得に失敗しました。別の画像をお試しください。');
            return false;
        }
    }
