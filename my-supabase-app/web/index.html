    async function applyHistoryState(state) {
        if (!state?.__appHistory) return;

        isApplyingHistoryState = true;
        try {
            closeModalDirect();
            if (calendarState.isEntryPopoverOpen) {
                closeCalendarEntryPopoverDirect();
            } else {
                unlockCalendarBodyScroll();
            }

            applyCurrentMonthStateValue(state.calendarMonth || getCurrentMonthStateValue());
            await switchTab(state.tab || 'input', { fromHistory: true });

            if ((state.tab || 'input') === 'calendar') {
                applyCurrentMonthStateValue(state.calendarMonth || getCurrentMonthStateValue());
                calendarState.selectedDate = state.calendarSelectedDate || '';
                calendarState.editingEntryId = '';
                calendarState.isEntryPopoverOpen = false;
                renderCalendarView();

                if (state.calendarPopoverOpen) {
                    calendarState.selectedDate = state.calendarSelectedDate || '';
                    calendarState.editingEntryId = state.calendarEditingEntryId || '';
                    calendarState.isEntryPopoverOpen = true;
                    lockCalendarBodyScroll();
                    renderCalendarView();
                }
            }

            if (state.modalType) {
                await ensureAllRecordsLoaded();
                const modalIdx = getRecordIndexByIdentity(state.modalTitle || '', state.modalDate || '');
                if (modalIdx >= 0) {
                    if (state.modalType === 'edit') {
                        openModalEdit(modalIdx, { fromHistory: true });
                    } else {
                        openModal(modalIdx, { fromHistory: true });
                    }
                }
            }

            if (state.lightboxSrc) {
                openImageLightbox(state.lightboxSrc, state.lightboxAlt || '拡大画像', { fromHistory: true });
            }
        } finally {
            isApplyingHistoryState = false;
        }
    }

    window.addEventListener('popstate', (event) => {
        if (!event.state?.__appHistory) return;
        appHistoryDepth = Math.max(0, appHistoryDepth - 1);
        void applyHistoryState(event.state);
    });

    // Escキーで表示中のオーバーレイを閉じる / Ctrl+Zで画像を元に戻す
    document.addEventListener('keydown', async (e) => {
        if (e.key === 'Escape') {
            const placementOverlay = document.getElementById('image-placement-overlay');
            if (placementOverlay?.classList.contains('active')) {
                closeImagePlacementPicker();
                return;
            }

            const lightbox = document.getElementById('image-lightbox');
            if (lightbox?.classList.contains('active')) {
                closeImageLightbox();
                return;
            }

            if (calendarState.isEntryPopoverOpen) {
                closeCalendarEntryPopover();
                return;
            }

            const modal = document.getElementById('modal-overlay');
            if (modal?.classList.contains('active')) {
                closeModal();
                return;
            }
        }

        // Ctrl+Z (Mac: Cmd+Z) で画像変更を元に戻す
        if ((e.ctrlKey || e.metaKey) && e.key === 'z' && imageHistory.length > 0) {
            e.preventDefault();
            const last = imageHistory.pop();
            try {
                const data = {
                    orig_title: last.title,
                    orig_date: last.date,
                    record_type: allRecords[last.idx]?.record_type || 'record',
                    title: last.title,
                    quote: allRecords[last.idx]?.quote || '',
                    quote_speaker: allRecords[last.idx]?.quote_speaker || '',
                    thoughts: allRecords[last.idx]?.thoughts || '',
                    summary: allRecords[last.idx]?.summary || '',
                    tag: allRecords[last.idx]?.tag || '',
                };
                if (last.prevImage) {
                    data.keep_image = last.prevImage;
                } else {
                    data.remove_image = true;
                }
                const resp = await fetch('/api/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (resp.ok) {
                    invalidateRecordsCache();
                    await fetchAllRecords({ force: true });
                    const refreshedIdx = getRecordIndexByIdentity(last.title, last.date);
                    openModal(refreshedIdx >= 0 ? refreshedIdx : last.idx);
                }
            } catch (err) { console.error('Undo failed:', err); }
        }
    });

    // ===== お気に入りトグル =====
    async function toggleFavorite(title, date, btnEl) {
        try {
            const resp = await fetch('/api/favorite', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, date })
            });
            if (resp.ok) {
                const result = await resp.json();
                btnEl.textContent = result.favorite ? '★' : '☆';
                btnEl.classList.toggle('favorited', result.favorite);
                const targetRecord = allRecords.find((record) => record.title === title && record.date === date);
                if (targetRecord) {
                    targetRecord.favorite = result.favorite;
                }
                if (getActiveTabId() === 'favorites') {
                    await loadFavorites();
                }
            }
        } catch (e) { console.error(e); }
    }

    // ===== 今読んでいるトグル =====
    async function toggleCurrentlyReading(title, date, btnEl) {
        const targetRecord = allRecords.find((record) => record.title === title && record.date === date);
        if (!targetRecord) return;

        const applyReadingState = (value) => {
            targetRecord.currently_reading = value;
            if (btnEl) {
                btnEl.textContent = value ? '📖' : '📕';
                btnEl.classList.toggle('reading-active', value);
            }
        };

        const renderReadingFilterIfNeeded = () => {
            if (recordsFilterState.currentlyReadingOnly) {
                renderRecordsGrid(getFilteredRecordEntries({ mode: 'records' }), { mode: 'records' });
            }
        };

        const previousValue = Boolean(targetRecord.currently_reading);
        const nextValue = !previousValue;
        applyReadingState(nextValue);
        if (btnEl) btnEl.disabled = true;

        renderReadingFilterIfNeeded();

        try {
            const resp = await fetch('/api/currently-reading', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, date, currently_reading: nextValue })
            });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.error || 'サーバーエラー');
            }
            const result = await resp.json();
            const savedValue = typeof result.currently_reading === 'boolean'
                ? result.currently_reading
                : nextValue;
            applyReadingState(savedValue);
            renderReadingFilterIfNeeded();
        } catch (e) {
            applyReadingState(previousValue);
            renderReadingFilterIfNeeded();
            console.error(e);
            alert(`今読んでいるの更新に失敗しました: ${e?.message || '通信エラー'}`);
        } finally {
            if (btnEl) btnEl.disabled = false;
        }
    }

    // ===== お気に入り読み込み（グリッド） =====
    async function loadFavorites(options = {}) {
        const { force = false } = options;
        const container = document.getElementById('favorites-container');
        try {
            await fetchAllRecords({ force });
            const favs = allRecords.filter((record) => (record?.record_type || 'record') !== 'next' && record.favorite);
            container.innerHTML = '';

            if (favs.length === 0) {
                container.innerHTML = '<div class="panel empty-message" style="grid-column:1/-1;">まだお気に入りがありません。<br>過去の記録タブで⭐を押して登録しましょう！</div>';
                return;
            }

            favs.forEach((record) => {
                const realIdx = allRecords.findIndex(r => r.title === record.title && r.date === record.date);
                container.appendChild(buildMangaCardElement(record, realIdx >= 0 ? realIdx : 0));
            });
        } catch (e) {
            console.error(e);
            container.innerHTML = '<div class="panel" style="grid-column:1/-1;color:red;text-align:center;font-weight:bold;font-size:1.2rem;padding:32px;">通信エラー</div>';
        }
    }

    // ===== 編集モードの開始 (互換用) =====
    function startEdit(btn, idx) {
        openModalEdit(idx);
    }

    // ===== AIで箇条書きまとめ生成 =====
    async function generateBulletSummary() {
        const titleInput = document.getElementById('title');
        const thoughtsInput = document.getElementById('thoughts');
        const tagInput = document.getElementById('tag');
        const summaryInput = document.getElementById('bullet-summary');
        const btn = document.getElementById('generate-summary-btn');

        if (!thoughtsInput || !summaryInput) return;

        const title = titleInput ? titleInput.value.trim() : '';
        const quoteEntries = readQuoteEntries(document.getElementById('quote-entry-list'));
        const quotePayload = serializeQuoteEntries(quoteEntries);
        const quote = formatQuoteEntriesForSummary(quoteEntries);
        const thoughts = thoughtsInput.value.trim();
        const tag = tagInput ? tagInput.value.trim() : '';

        if (!thoughts) {
            alert('感想を入力してください。');
            return;
        }

        if (btn) {
            btn.disabled = true;
            btn.textContent = 'まとめ中...';
        }
        summaryInput.value = '';

        try {
            const resp = await fetch('/api/bullet-summary', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, quote, quote_speaker: quotePayload.quote_speaker, quote_entries: quotePayload.quote_entries, thoughts, tag })
            });

            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.error || 'まとめに失敗しました');
            }

            const data = await resp.json();
            summaryInput.value = data.summary || '';
        } catch (e) {
            console.error(e);
            alert(e.message || '通信エラーが発生しました');
        } finally {
            if (btn) {
                btn.disabled = false;
                btn.textContent = 'AIで箇条書きにまとめる';
            }
        }
    }

    // ===== 詳細モーダルからAIでまとめる（保存まで行う）=====
    async function generateSummaryForModal(idx, btnEl) {
        const record = allRecords[idx];
        if (!record) return;

        if (!record.thoughts || !record.thoughts.trim()) {
            alert('感想（thoughts）を入力してください。');
            return;
        }

        const prevText = btnEl ? btnEl.textContent : '';
        if (btnEl) {
            btnEl.disabled = true;
            btnEl.textContent = 'まとめ中...';
        }

        try {
            const quoteEntries = getRecordQuoteEntries(record);
            const quotePayload = serializeQuoteEntries(quoteEntries);
            const resp = await fetch('/api/bullet-summary', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: record.title,
                    quote: formatQuoteEntriesForSummary(quoteEntries),
                    quote_speaker: quotePayload.quote_speaker,
                    quote_entries: quotePayload.quote_entries,
                    thoughts: record.thoughts || '',
                    tag: record.tag || ''
                })
            });

            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.error || 'まとめに失敗しました');
            }

            const data = await resp.json();
            const summary = (data.summary || '').trim();
            if (!summary) {
                alert('AIのまとめが生成できませんでした。');
                return;
            }

            const updateResp = await fetch('/api/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    orig_title: record.title,
                    orig_date: record.date,
                    record_type: record.record_type || 'record',
                    title: record.title,
                    quote: quotePayload.quote,
                    quote_speaker: quotePayload.quote_speaker,
                    quote_entries: quotePayload.quote_entries,
                    thoughts: record.thoughts || '',
                    tag: record.tag || '',
                    summary
                })
            });

            if (!updateResp.ok) {
                const err = await updateResp.json().catch(() => ({}));
                throw new Error(err.error || '更新に失敗しました');
            }

            invalidateRecordsCache();
            await loadRecords({ force: true });
            const realIdx = allRecords.findIndex(r => r.title === record.title && r.date === record.date);
            openModal(realIdx >= 0 ? realIdx : idx);
        } catch (e) {
            console.error(e);
            alert(e.message || '通信エラーが発生しました');
        } finally {
            if (btnEl) {
                btnEl.disabled = false;
                btnEl.textContent = prevText || 'AIでまとめる';
            }
        }
    }

    // ===== 編集モーダルの入力値を使ってAIで生成（保存は手動）=====
    async function generateSummaryInEdit(idx, btnEl) {
        const record = allRecords[idx];
        if (!record) return;

        const body = document.getElementById('modal-body');
        if (!body) return;

        const titleVal = body.querySelector('.edit-title')?.value || record.title;
        const quoteEntries = readQuoteEntries(body.querySelector('#edit-quote-entry-list'));
        const quotePayload = serializeQuoteEntries(quoteEntries);
        const quoteVal = formatQuoteEntriesForSummary(quoteEntries);
        const thoughtsVal = body.querySelector('.edit-thoughts')?.value || record.thoughts || '';
        const tagVal = body.querySelector('.edit-tag')?.value || record.tag || '';

        if (!thoughtsVal || !thoughtsVal.trim()) {
            alert('感想（thoughts）を入力してください。');
            return;
        }

        const summaryArea = body.querySelector('.edit-summary');
        if (!summaryArea) return;

        const prevText = btnEl ? btnEl.textContent : '';
        if (btnEl) {
            btnEl.disabled = true;
            btnEl.textContent = '生成中...';
        }

        try {
            const resp = await fetch('/api/bullet-summary', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: titleVal,
                    quote: quoteVal,
                    quote_speaker: quotePayload.quote_speaker,
                    quote_entries: quotePayload.quote_entries,
                    thoughts: thoughtsVal,
                    tag: tagVal
                })
            });

            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.error || '生成に失敗しました');
            }

            const data = await resp.json();
            const summary = (data.summary || '').trim();
            summaryArea.value = summary;
        } catch (e) {
            console.error(e);
            alert(e.message || '通信エラーが発生しました');
        } finally {
            if (btnEl) {
                btnEl.disabled = false;
                btnEl.textContent = prevText || 'AIでまとめる';
            }
        }
    }
    // ===== 新規保存 =====
    async function saveRecord(mode = 'record') {
        const isNextMode = mode === 'next';
        const titleInput = document.getElementById(isNextMode ? 'next-title' : 'title');
        const thoughtsInput = document.getElementById('thoughts');
        const tagInput = document.getElementById('tag');
        const summaryInput = document.getElementById('bullet-summary');
        const submitBtn = document.getElementById(isNextMode ? 'next-submit-btn' : 'submit-btn');
        const quotePayload = isNextMode
            ? { quote: '', quote_speaker: '', quote_entries: [] }
            : serializeQuoteEntries(readQuoteEntries(document.getElementById('quote-entry-list')));

        const title = titleInput.value.trim();
        const thoughts = isNextMode ? '' : (thoughtsInput?.value.trim() || '');
        if (!title || (!isNextMode && !thoughts)) return;

        submitBtn.disabled = true;
        submitBtn.textContent = '保存中...';

        const hadManualImage = !isNextMode && Boolean(currentImageBase64);
        const data = {
            record_type: isNextMode ? 'next' : 'record',
            title,
            quote: quotePayload.quote,
            quote_speaker: quotePayload.quote_speaker,
            quote_entries: quotePayload.quote_entries,
            thoughts,
            tag: isNextMode ? '' : tagInput.value.trim(),
            summary: isNextMode ? '' : (summaryInput ? summaryInput.value.trim() : ''),
            image: isNextMode ? nextImageBase64 : currentImageBase64
        };

        try {
            const response = await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (response.ok) {
                titleInput.value = '';
                if (isNextMode) {
                    clearNextImage();
                    invalidateRecordsCache();
                    await loadRecords({ force: true, mode: 'next' });
                } else {
                    thoughtsInput.value = '';
                    tagInput.value = '';
                    renderQuoteEntries(document.getElementById('quote-entry-list'), []);
                    if (summaryInput) summaryInput.value = '';
                    clearImage();
                    invalidateRecordsCache();
                    await switchTab('records');

                    if (!hadManualImage) {
                        triggerAutoCoverFetch(title);
                    }
                }
            } else {
                const err = await response.json().catch(() => ({}));
                alert(`保存エラー: ${err.error || '保存に失敗しました。'}`);
            }
        } catch (e) {
            console.error(e);
            alert('保存に失敗しました。');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = isNextMode ? '次読みたいに追加' : '保存する';
        }
    }

    // ===== 表紙画像の自動取得（保存後のバックグラウンド処理） =====
    async function triggerAutoCoverFetch(title) {
        try {
            // 最新レコードを取得してdateを見つける
            await fetchAllRecords({ force: true });
            const targetRecord = allRecords.find((record) => record.title === title && (record?.record_type || 'record') !== 'next');
            if (!targetRecord || targetRecord.image) return;

            const resp = await fetch('/api/image-search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: targetRecord.title, date: targetRecord.date })
            });

            if (!resp.ok) return;

            const result = await resp.json();
            if (result.status === 'success' && result.image_url) {
                // レコードキャッシュを更新して再描画
                invalidateRecordsCache();
                await fetchAllRecords({ force: true });
                renderRecordsGrid(getFilteredRecordEntries());
            }
        } catch (e) {
            console.warn('Auto-cover fetch failed:', e);
        }
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g,
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
    }

    function escapeAttr(str) {
        return str.replace(/[&<>"']/g,
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[tag] || tag)
        );
    }

    function wait(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function waitForAnimationFrame() {
        return new Promise((resolve) => requestAnimationFrame(() => resolve()));
    }

    function clearStartupIntro() {
        const overlay = document.getElementById('startup-title-overlay');
        const mark = document.getElementById('startup-title-mark');
        if (mark) {
            mark.getAnimations().forEach((animation) => animation.cancel());
            mark.removeAttribute('style');
        }
        if (overlay) {
            overlay.hidden = true;
        }
        document.body.classList.remove(
            'startup-intro-pending',
            'startup-intro-running',
            'startup-intro-reveal',
            'startup-intro-content-reveal',
            'startup-intro-settled'
        );
    }

    async function playStartupIntro() {
        const mobileQuery = window.matchMedia('(max-width: 820px), (hover: none) and (pointer: coarse)');
        const reducedMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
        const overlay = document.getElementById('startup-title-overlay');
        const mark = document.getElementById('startup-title-mark');
        const targetTitle = document.querySelector('.main-title-band h1');

        if (!document.body.classList.contains('startup-intro-pending')) {
            return;
        }

        if (!mobileQuery.matches || reducedMotionQuery.matches || !overlay || !mark || !targetTitle || !mark.animate) {
            clearStartupIntro();
            return;
        }

        overlay.hidden = false;
        document.body.classList.add('startup-intro-running');
        await waitForAnimationFrame();
        await waitForAnimationFrame();

        const startRect = mark.getBoundingClientRect();
        const targetRect = targetTitle.getBoundingClientRect();
        if (!startRect.width || !targetRect.width) {
            clearStartupIntro();
            return;
        }

        const startX = startRect.left + startRect.width / 2;
        const startY = startRect.top + startRect.height / 2;
        const targetX = targetRect.left + targetRect.width / 2;
        const targetY = targetRect.top + targetRect.height / 2;
        const finalScale = Math.max(
            0.34,
            Math.min(1, Math.min(targetRect.width / startRect.width, targetRect.height / startRect.height))
        );

        mark.style.left = `${startX}px`;
        mark.style.top = `${startY}px`;

        const titleAnimation = mark.animate([
            {
                left: `${startX}px`,
                top: `${startY}px`,
                opacity: 1,
                transform: 'translate(-50%, -50%) scale(1)'
            },
            {
                left: `${startX}px`,
                top: `${startY}px`,
                opacity: 1,
                transform: 'translate(-50%, -50%) scale(1)',
                offset: 0.24
            },
            {
                left: `${startX}px`,
                top: `${startY}px`,
                opacity: 1,
                transform: 'translate(-50%, -50%) scale(1)',
                offset: 0.56
            },
            {
                left: `${targetX}px`,
                top: `${targetY}px`,
                opacity: 1,
                transform: `translate(-50%, -50%) scale(${finalScale})`
            }
        ], {
            duration: 1380,
            easing: 'cubic-bezier(0.16, 1, 0.3, 1)',
            fill: 'forwards'
        });

        try {
            await titleAnimation.finished;
        } catch (_error) {
            clearStartupIntro();
            return;
        }

        document.body.classList.add('startup-intro-reveal', 'startup-intro-settled');
        await wait(1000);
        document.body.classList.add('startup-intro-content-reveal');
        await wait(840);
        clearStartupIntro();
    }

    window.addEventListener('DOMContentLoaded', async () => {
        updateQuoteEntryRemoveButtons(document.getElementById('quote-entry-list'));
        await ensurePassphraseUnlocked();
        const startupIntroPromise = playStartupIntro();
        const initialTab = getActiveTabId();
        if (initialTab === 'records') {
            await loadRecords();
        } else if (initialTab === 'calendar') {
            await loadCalendarView();
        } else if (initialTab === 'favorites') {
            await loadFavorites();
        } else if (initialTab === 'next') {
            await loadRecords({ mode: 'next' });
        } else {
            const warmData = () => {
                void fetchAllRecords().catch((error) => console.warn('record preload skipped', error));
            };
            if ('requestIdleCallback' in window) {
                window.requestIdleCallback(warmData, { timeout: 1200 });
            } else {
                setTimeout(warmData, 700);
            }
        }
        await startupIntroPromise;
        const initialState = buildHistoryState();
        history.replaceState(initialState, '');
        history.pushState(initialState, '');
        appHistoryDepth = 1;
    });
